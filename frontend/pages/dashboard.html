<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DSA Learning</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body>
    <!-- Dashboard Content -->
    <div class="dashboard-page">
        <!-- Stats Overview -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="stats-overview">
                    <div class="row">
                        <div class="col-lg-3 col-md-6 mb-3">
                            <div class="stat-card-enhanced bg-gradient-primary text-white">
                                <div class="stat-icon-wrapper bg-white bg-opacity-20 text-white mb-3">
                                    <i class="fas fa-calendar-check fa-2x"></i>
                                </div>
                                <h3 class="stat-number-enhanced" id="dashboardCompletedDays">0</h3>
                                <p class="stat-label-enhanced">Days Completed</p>
                                <div class="progress mt-3" style="height: 4px;">
                                    <div class="progress-bar bg-white" style="width: 0%" id="daysProgressBar"></div>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-3 col-md-6 mb-3">
                            <div class="stat-card-enhanced bg-gradient-success text-white">
                                <div class="stat-icon-wrapper bg-white bg-opacity-20 text-white mb-3">
                                    <i class="fas fa-project-diagram fa-2x"></i>
                                </div>
                                <h3 class="stat-number-enhanced" id="dashboardCompletedProjects">0</h3>
                                <p class="stat-label-enhanced">Projects Built</p>
                                <div class="progress mt-3" style="height: 4px;">
                                    <div class="progress-bar bg-white" style="width: 0%" id="projectsProgressBar"></div>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-3 col-md-6 mb-3">
                            <div class="stat-card-enhanced bg-gradient-warning text-white">
                                <div class="stat-icon-wrapper bg-white bg-opacity-20 text-white mb-3">
                                    <i class="fas fa-code fa-2x"></i>
                                </div>
                                <h3 class="stat-number-enhanced" id="dashboardSolvedProblems">0</h3>
                                <p class="stat-label-enhanced">Problems Solved</p>
                                <div class="progress mt-3" style="height: 4px;">
                                    <div class="progress-bar bg-white" style="width: 0%" id="problemsProgressBar"></div>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-3 col-md-6 mb-3">
                            <div class="stat-card-enhanced bg-gradient-info text-white">
                                <div class="stat-icon-wrapper bg-white bg-opacity-20 text-white mb-3">
                                    <i class="fas fa-clock fa-2x"></i>
                                </div>
                                <h3 class="stat-number-enhanced" id="dashboardStudyHours">0</h3>
                                <p class="stat-label-enhanced">Study Hours</p>
                                <div class="progress mt-3" style="height: 4px;">
                                    <div class="progress-bar bg-white" style="width: 0%" id="hoursProgressBar"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Current Focus & Quick Actions -->
        <div class="row mb-4">
            <div class="col-lg-8">
                <div class="card-enhanced h-100">
                    <div class="card-header-enhanced">
                        <h5 class="mb-0">
                            <i class="fas fa-bullseye text-primary me-2"></i>
                            Current Focus
                        </h5>
                    </div>
                    <div class="card-body-enhanced">
                        <div id="currentFocusContent">
                            <!-- Dynamic content loaded here -->
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card-enhanced h-100">
                    <div class="card-header-enhanced">
                        <h5 class="mb-0">
                            <i class="fas fa-lightning-bolt text-warning me-2"></i>
                            Quick Actions
                        </h5>
                    </div>
                    <div class="card-body-enhanced">
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary btn-enhanced" onclick="startStudySession()">
                                <i class="fas fa-play me-2"></i>Start Study Session
                            </button>
                            <button class="btn btn-success btn-enhanced" onclick="addQuickNote()">
                                <i class="fas fa-plus me-2"></i>Quick Note
                            </button>
                            <button class="btn btn-info btn-enhanced" onclick="viewResources()">
                                <i class="fas fa-book me-2"></i>View Resources
                            </button>
                            <button class="btn btn-warning btn-enhanced" onclick="practiceProblems()">
                                <i class="fas fa-dumbbell me-2"></i>Practice Problems
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Learning Progress Chart -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card-enhanced">
                    <div class="card-header-enhanced">
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">
                                <i class="fas fa-chart-line text-success me-2"></i>
                                Learning Progress
                            </h5>
                            <div class="btn-group btn-group-sm" role="group">
                                <button type="button" class="btn btn-outline-primary active"
                                    onclick="changeChartView('weekly')">Weekly</button>
                                <button type="button" class="btn btn-outline-primary"
                                    onclick="changeChartView('daily')">Daily</button>
                                <button type="button" class="btn btn-outline-primary"
                                    onclick="changeChartView('cumulative')">Cumulative</button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body-enhanced">
                        <canvas id="dashboardProgressChart" height="100"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Upcoming Schedule & Recent Activity -->
        <div class="row mb-4">
            <div class="col-lg-6">
                <div class="card-enhanced h-100">
                    <div class="card-header-enhanced">
                        <h5 class="mb-0">
                            <i class="fas fa-calendar-alt text-info me-2"></i>
                            Upcoming Schedule
                        </h5>
                    </div>
                    <div class="card-body-enhanced">
                        <div id="upcomingSchedule">
                            <!-- Dynamic schedule content -->
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card-enhanced h-100">
                    <div class="card-header-enhanced">
                        <h5 class="mb-0">
                            <i class="fas fa-history text-secondary me-2"></i>
                            Recent Activity
                        </h5>
                    </div>
                    <div class="card-body-enhanced">
                        <div id="recentActivityList">
                            <!-- Dynamic activity content -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Study Streak & Goals -->
        <div class="row">
            <div class="col-lg-4">
                <div class="card-enhanced text-center">
                    <div class="card-body-enhanced">
                        <div class="streak-display">
                            <div class="streak-icon text-warning mb-3">
                                <i class="fas fa-fire fa-4x animate-pulse"></i>
                            </div>
                            <h2 class="streak-number text-primary" id="streakDisplay">0</h2>
                            <p class="text-muted">Day Streak</p>
                            <div class="streak-message mt-3">
                                <span class="badge bg-gradient-warning text-dark" id="streakMessage">Keep it up!</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card-enhanced">
                    <div class="card-header-enhanced">
                        <h5 class="mb-0">
                            <i class="fas fa-target text-danger me-2"></i>
                            Daily Goals
                        </h5>
                    </div>
                    <div class="card-body-enhanced">
                        <div class="goals-container">
                            <div class="goal-item mb-3">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <span class="goal-label">Study Time</span>
                                    <span class="goal-progress" id="studyTimeGoal">0h / 2h</span>
                                </div>
                                <div class="progress">
                                    <div class="progress-bar bg-primary" style="width: 0%" id="studyTimeGoalBar"></div>
                                </div>
                            </div>

                            <div class="goal-item mb-3">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <span class="goal-label">Problems Solved</span>
                                    <span class="goal-progress" id="problemsGoal">0 / 3</span>
                                </div>
                                <div class="progress">
                                    <div class="progress-bar bg-success" style="width: 0%" id="problemsGoalBar"></div>
                                </div>
                            </div>

                            <div class="goal-item">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <span class="goal-label">Notes Written</span>
                                    <span class="goal-progress" id="notesGoal">0 / 1</span>
                                </div>
                                <div class="progress">
                                    <div class="progress-bar bg-info" style="width: 0%" id="notesGoalBar"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/dashboard.js"></script>
</body>

</html>
