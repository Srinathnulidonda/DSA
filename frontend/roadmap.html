<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Roadmap - DSA Mastery</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/animations.css">
</head>

<body class="bg-gray-50">

    <!-- Include Sidebar from dashboard -->
    <aside class="sidebar d-none d-lg-block position-fixed top-0 start-0 h-100 bg-white shadow-sm"
        style="width: 250px; z-index: 1000;">
        <!-- Same sidebar as dashboard.html -->
    </aside>

    <!-- Main Content -->
    <main class="main-content" style="margin-left: 250px;">
        <!-- Top Navigation (same as dashboard) -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
            <!-- Same navigation as dashboard.html -->
        </nav>

        <!-- Roadmap Content -->
        <div class="container-fluid p-4">
            <!-- Header -->
            <div class="row mb-4">
                <div class="col-12">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <h1 class="h3 fw-bold mb-1">14-Week DSA Roadmap</h1>
                            <p class="text-muted mb-0">Your complete journey from basics to advanced</p>
                        </div>
                        <div class="d-flex gap-2">
                            <button class="btn btn-outline-primary rounded-pill" onclick="filterByStatus('all')">
                                <i class="fas fa-list me-2"></i> All Weeks
                            </button>
                            <button class="btn btn-outline-success rounded-pill" onclick="filterByStatus('completed')">
                                <i class="fas fa-check me-2"></i> Completed
                            </button>
                            <button class="btn btn-outline-warning rounded-pill" onclick="filterByStatus('current')">
                                <i class="fas fa-clock me-2"></i> Current
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Progress Overview -->
            <div class="row mb-4">
                <div class="col-12">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4">
                            <h5 class="fw-bold mb-3">Overall Progress</h5>
                            <div class="progress mb-3" style="height: 25px;">
                                <div class="progress-bar bg-gradient-to-r from-blue-500 to-purple-600"
                                    role="progressbar" style="width: 35%">
                                    <span class="fw-semibold">35% Complete</span>
                                </div>
                            </div>
                            <div class="row text-center">
                                <div class="col">
                                    <h6 class="fw-bold text-success mb-0">5</h6>
                                    <small class="text-muted">Weeks Completed</small>
                                </div>
                                <div class="col">
                                    <h6 class="fw-bold text-warning mb-0">1</h6>
                                    <small class="text-muted">Week In Progress</small>
                                </div>
                                <div class="col">
                                    <h6 class="fw-bold text-muted mb-0">8</h6>
                                    <small class="text-muted">Weeks Remaining</small>
                                </div>
                                <div class="col">
                                    <h6 class="fw-bold text-info mb-0">120+</h6>
                                    <small class="text-muted">Hours Invested</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Roadmap Timeline -->
            <div class="roadmap-timeline" id="roadmapContainer">
                <!-- Week cards will be dynamically loaded here -->
            </div>

            <!-- Week Detail Modal -->
            <div class="modal fade" id="weekDetailModal" tabindex="-1">
                <div class="modal-dialog modal-xl">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title fw-bold" id="weekModalTitle">Week Details</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body" id="weekModalBody">
                            <!-- Week details will be loaded here -->
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            <button type="button" class="btn btn-primary" onclick="startWeek()">Start Learning</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-bottom-nav d-lg-none position-fixed bottom-0 start-0 end-0 bg-white shadow-lg">
        <!-- Same as dashboard -->
    </nav>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/roadmap.js"></script>

    <style>
        .roadmap-timeline {
            position: relative;
            padding-left: 30px;
        }

        .roadmap-timeline::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e5e7eb;
        }

        .week-card {
            position: relative;
            margin-bottom: 2rem;
            padding-left: 30px;
        }

        .week-card::before {
            content: '';
            position: absolute;
            left: -15px;
            top: 20px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: white;
            border: 3px solid #e5e7eb;
            z-index: 1;
        }

        .week-card.completed::before {
            background: #10b981;
            border-color: #10b981;
        }

        .week-card.current::before {
            background: #f59e0b;
            border-color: #f59e0b;
            animation: pulse 2s infinite;
        }

        .week-card.locked::before {
            background: #6b7280;
            border-color: #6b7280;
        }
    </style>
</body>

</html>
