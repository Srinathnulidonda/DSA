<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14-Week Roadmap - DSA Learning</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/mobile.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="font-inter bg-gray-50 dark:bg-gray-900">

    <!-- Top Navigation (Same as dashboard) -->
    <nav class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 fixed top-0 w-full z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <!-- Mobile menu button -->
                    <button id="mobileMenuToggle"
                        class="md:hidden p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700">
                        <i class="bi bi-list text-xl"></i>
                    </button>

                    <!-- Logo -->
                    <div class="flex-shrink-0 flex items-center ml-4 md:ml-0">
                        <h1 class="text-xl font-bold text-gray-900 dark:text-white">DSA Learning</h1>
                    </div>

                    <!-- Desktop Navigation -->
                    <div class="hidden md:ml-10 md:flex md:space-x-8">
                        <a href="dashboard.html"
                            class="border-transparent text-gray-500 dark:text-gray-300 hover:border-gray-300 hover:text-gray-700 dark:hover:text-white inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
                            Dashboard
                        </a>
                        <a href="roadmap.html"
                            class="border-blue-500 text-gray-900 dark:text-white inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
                            Roadmap
                        </a>
                        <a href="progress.html"
                            class="border-transparent text-gray-500 dark:text-gray-300 hover:border-gray-300 hover:text-gray-700 dark:hover:text-white inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
                            Progress
                        </a>
                        <a href="calendar.html"
                            class="border-transparent text-gray-500 dark:text-gray-300 hover:border-gray-300 hover:text-gray-700 dark:hover:text-white inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
                            Calendar
                        </a>
                    </div>
                </div>

                <div class="flex items-center space-x-4">
                    <!-- Theme Toggle -->
                    <button id="themeToggle" class="p-2 text-gray-400 hover:text-gray-500 dark:hover:text-gray-300">
                        <i class="bi bi-sun text-xl dark:hidden"></i>
                        <i class="bi bi-moon text-xl hidden dark:block"></i>
                    </button>

                    <!-- Profile -->
                    <div class="relative">
                        <button id="profileToggle"
                            class="flex items-center space-x-2 p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
                            <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=3b82f6&color=fff"
                                alt="Profile" class="w-8 h-8 rounded-full">
                            <span id="userName"
                                class="hidden sm:block text-sm font-medium text-gray-700 dark:text-gray-300">User</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-16 pb-20 md:pb-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

            <!-- Header -->
            <div class="mb-8">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between">
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900 dark:text-white">14-Week DSA Roadmap</h1>
                        <p class="mt-2 text-gray-600 dark:text-gray-400">Master Data Structures & Algorithms with this
                            comprehensive learning path</p>
                    </div>

                    <div class="mt-4 sm:mt-0 flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-3">
                        <button id="toggleCompletedBtn"
                            class="px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700">
                            <i class="bi bi-eye mr-2"></i>Hide Completed
                        </button>
                        <button id="filterBtn"
                            class="px-4 py-2 text-sm font-medium text-blue-700 bg-blue-100 dark:bg-blue-900 dark:text-blue-300 rounded-lg hover:bg-blue-200 dark:hover:bg-blue-800">
                            <i class="bi bi-funnel mr-2"></i>Filter
                        </button>
                    </div>
                </div>

                <!-- Progress Overview -->
                <div class="mt-6 bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Overall Progress</h2>
                        <span id="overallProgress" class="text-2xl font-bold text-blue-600 dark:text-blue-400">0%</span>
                    </div>

                    <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-3 mb-4">
                        <div id="progressBar"
                            class="bg-gradient-to-r from-blue-500 to-purple-500 h-3 rounded-full transition-all duration-500"
                            style="width: 0%"></div>
                    </div>

                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 text-center">
                        <div>
                            <div class="text-2xl font-bold text-gray-900 dark:text-white" id="completedDays">0</div>
                            <div class="text-sm text-gray-600 dark:text-gray-400">Days Completed</div>
                        </div>
                        <div>
                            <div class="text-2xl font-bold text-gray-900 dark:text-white" id="totalHours">0h</div>
                            <div class="text-sm text-gray-600 dark:text-gray-400">Total Time</div>
                        </div>
                        <div>
                            <div class="text-2xl font-bold text-gray-900 dark:text-white" id="currentWeek">1</div>
                            <div class="text-sm text-gray-600 dark:text-gray-400">Current Week</div>
                        </div>
                        <div>
                            <div class="text-2xl font-bold text-gray-900 dark:text-white" id="weekProgress">0%</div>
                            <div class="text-sm text-gray-600 dark:text-gray-400">Week Progress</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Roadmap Content -->
            <div class="space-y-8" id="roadmapContainer">
                <!-- Weeks will be dynamically loaded here -->
            </div>
        </div>
    </main>

    <!-- Mobile Bottom Navigation -->
    <nav
        class="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 z-30">
        <div class="grid grid-cols-5">
            <a href="dashboard.html"
                class="flex flex-col items-center justify-center py-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                <i class="bi bi-house text-xl mb-1"></i>
                <span class="text-xs font-medium">Home</span>
            </a>
            <a href="roadmap.html"
                class="flex flex-col items-center justify-center py-2 text-blue-600 dark:text-blue-400">
                <i class="bi bi-map text-xl mb-1"></i>
                <span class="text-xs font-medium">Roadmap</span>
            </a>
            <a href="pomodoro.html"
                class="flex flex-col items-center justify-center py-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                <i class="bi bi-clock text-xl mb-1"></i>
                <span class="text-xs font-medium">Timer</span>
            </a>
            <a href="progress.html"
                class="flex flex-col items-center justify-center py-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                <i class="bi bi-graph-up text-xl mb-1"></i>
                <span class="text-xs font-medium">Progress</span>
            </a>
            <a href="profile.html"
                class="flex flex-col items-center justify-center py-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                <i class="bi bi-person text-xl mb-1"></i>
                <span class="text-xs font-medium">Profile</span>
            </a>
        </div>
    </nav>

    <!-- Day Detail Modal -->
    <div id="dayDetailModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                <h3 class="text-xl font-semibold text-gray-900 dark:text-white" id="modalDayTitle">Day Details</h3>
                <button id="closeDayModal" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>

            <div class="p-6" id="modalDayContent">
                <!-- Day content will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Filter Modal -->
    <div id="filterModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl max-w-md w-full">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                <h3 class="text-xl font-semibold text-gray-900 dark:text-white">Filter Roadmap</h3>
                <button id="closeFilterModal" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>

            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Status</label>
                    <div class="space-y-2">
                        <label class="flex items-center">
                            <input type="checkbox" id="filterCompleted"
                                class="rounded border-gray-300 text-blue-600 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50">
                            <span class="ml-2 text-sm text-gray-600 dark:text-gray-400">Completed</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" id="filterInProgress"
                                class="rounded border-gray-300 text-blue-600 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50">
                            <span class="ml-2 text-sm text-gray-600 dark:text-gray-400">In Progress</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" id="filterPending"
                                class="rounded border-gray-300 text-blue-600 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50"
                                checked>
                            <span class="ml-2 text-sm text-gray-600 dark:text-gray-400">Pending</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Week Range</label>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="weekFrom" min="1" max="14" value="1"
                            class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white">
                        <input type="number" id="weekTo" min="1" max="14" value="14"
                            class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white">
                    </div>
                </div>

                <div class="flex space-x-3 pt-4">
                    <button id="applyFilter"
                        class="flex-1 bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 transition-colors">
                        Apply Filter
                    </button>
                    <button id="clearFilter"
                        class="flex-1 bg-gray-300 dark:bg-gray-600 text-gray-700 dark:text-gray-300 py-2 px-4 rounded-lg hover:bg-gray-400 dark:hover:bg-gray-500 transition-colors">
                        Clear
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
    <script src="js/roadmap.js"></script>
</body>

</html>
