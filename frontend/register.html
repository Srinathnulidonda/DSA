<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - DSA Mastery</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/animations.css">
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-vh-100 d-flex align-items-center">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="card border-0 shadow-lg rounded-4 animate-fadeInUp">
                    <div class="card-body p-5">
                        <!-- Logo -->
                        <div class="text-center mb-4">
                            <img src="assets/images/logo.svg" alt="DSA Mastery" style="width: 60px;" class="mb-3">
                            <h3 class="fw-bold">Create Your Account</h3>
                            <p class="text-muted">Join thousands learning DSA effectively</p>
                        </div>

                        <!-- Progress Steps -->
                        <div class="d-flex justify-content-center mb-4">
                            <div class="d-flex align-items-center">
                                <div class="step-circle active">1</div>
                                <div class="step-line"></div>
                                <div class="step-circle">2</div>
                                <div class="step-line"></div>
                                <div class="step-circle">3</div>
                            </div>
                        </div>

                        <!-- Register Form -->
                        <form id="registerForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="username" class="form-label">Username</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <i class="fas fa-user text-muted"></i>
                                        </span>
                                        <input type="text" class="form-control border-start-0" id="username"
                                            name="username" pattern="[a-zA-Z0-9_]{3,20}" required>
                                    </div>
                                    <small class="text-muted">3-20 characters, letters, numbers, underscore</small>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label for="email" class="form-label">Email Address</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <i class="fas fa-envelope text-muted"></i>
                                        </span>
                                        <input type="email" class="form-control border-start-0" id="email" name="email"
                                            required>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="fas fa-lock text-muted"></i>
                                    </span>
                                    <input type="password" class="form-control border-start-0 border-end-0"
                                        id="password" name="password" minlength="8" required>
                                    <button class="btn btn-light border-start-0 toggle-password" type="button">
                                        <i class="fas fa-eye text-muted"></i>
                                    </button>
                                </div>
                                <div class="progress mt-2" style="height: 5px;">
                                    <div id="passwordStrength" class="progress-bar" role="progressbar"></div>
                                </div>
                                <small id="passwordStrengthText" class="text-muted">Password strength</small>
                            </div>

                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">Confirm Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="fas fa-lock text-muted"></i>
                                    </span>
                                    <input type="password" class="form-control border-start-0 border-end-0"
                                        id="confirmPassword" name="confirmPassword" required>
                                    <button class="btn btn-light border-start-0 toggle-password" type="button">
                                        <i class="fas fa-eye text-muted"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                                    <label class="form-check-label" for="agreeTerms">
                                        I agree to the <a href="#" class="text-primary">Terms of Service</a> and
                                        <a href="#" class="text-primary">Privacy Policy</a>
                                    </label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill mb-3">
                                <i class="fas fa-user-plus me-2"></i> Create Account
                            </button>
                        </form>

                        <!-- Social Sign Up -->
                        <div class="text-center mb-4">
                            <p class="text-muted mb-3">Or sign up with</p>
                            <div class="d-flex gap-3 justify-content-center">
                                <button class="btn btn-outline-secondary rounded-circle"
                                    style="width: 50px; height: 50px;">
                                    <i class="fab fa-google"></i>
                                </button>
                                <button class="btn btn-outline-secondary rounded-circle"
                                    style="width: 50px; height: 50px;">
                                    <i class="fab fa-github"></i>
                                </button>
                                <button class="btn btn-outline-secondary rounded-circle"
                                    style="width: 50px; height: 50px;">
                                    <i class="fab fa-linkedin"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Login Link -->
                        <div class="text-center">
                            <p class="mb-0">Already have an account? <a href="login.html"
                                    class="text-primary text-decoration-none fw-semibold">Login</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>

    <style>
        .step-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #e5e7eb;
            color: #6b7280;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .step-circle.active {
            background: #3b82f6;
            color: white;
        }

        .step-line {
            width: 50px;
            height: 2px;
            background: #e5e7eb;
            margin: 0 10px;
        }
    </style>
</body>

</html>
