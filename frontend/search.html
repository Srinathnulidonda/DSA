<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - DSA Mastery</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/theme.css">
</head>

<body class="bg-gray-50">

    <!-- Include Sidebar -->
    <aside class="sidebar d-none d-lg-block position-fixed top-0 start-0 h-100 bg-white shadow-sm"
        style="width: 250px; z-index: 1000;">
        <!-- Same sidebar structure -->
    </aside>

    <!-- Main Content -->
    <main class="main-content" style="margin-left: 250px;">
        <!-- Top Navigation -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
            <!-- Same navigation -->
        </nav>

        <!-- Search Content -->
        <div class="container-fluid p-4">
            <!-- Search Header -->
            <div class="row mb-4">
                <div class="col-12">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4">
                            <div class="input-group input-group-lg">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="fas fa-search text-muted"></i>
                                </span>
                                <input type="text" class="form-control border-start-0 border-end-0" id="searchInput"
                                    placeholder="Search topics, resources, notes..." autofocus>
                                <button class="btn btn-primary" onclick="performSearch()">
                                    Search
                                </button>
                            </div>

                            <!-- Search Filters -->
                            <div class="mt-3">
                                <div class="d-flex flex-wrap gap-2">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="filterTopics" checked>
                                        <label class="form-check-label" for="filterTopics">Topics</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="filterResources" checked>
                                        <label class="form-check-label" for="filterResources">Resources</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="filterNotes" checked>
                                        <label class="form-check-label" for="filterNotes">Notes</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="filterProblems" checked>
                                        <label class="form-check-label" for="filterProblems">Problems</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Search Results -->
            <div class="row">
                <div class="col-12">
                    <div id="searchResults">
                        <!-- Results Summary -->
                        <div class="mb-3" id="resultsSummary" style="display: none;">
                            <h5 class="text-muted">Found <span id="resultsCount">0</span> results for "<span
                                    id="searchQuery"></span>"</h5>
                        </div>

                        <!-- Topics Results -->
                        <div class="mb-4" id="topicsResults" style="display: none;">
                            <h5 class="fw-bold mb-3"><i class="fas fa-book me-2"></i> Topics</h5>
                            <div class="row" id="topicsContainer"></div>
                        </div>

                        <!-- Resources Results -->
                        <div class="mb-4" id="resourcesResults" style="display: none;">
                            <h5 class="fw-bold mb-3"><i class="fas fa-link me-2"></i> Resources</h5>
                            <div class="row" id="resourcesContainer"></div>
                        </div>

                        <!-- Notes Results -->
                        <div class="mb-4" id="notesResults" style="display: none;">
                            <h5 class="fw-bold mb-3"><i class="fas fa-sticky-note me-2"></i> Notes</h5>
                            <div class="row" id="notesContainer"></div>
                        </div>

                        <!-- No Results -->
                        <div class="text-center py-5" id="noResults" style="display: none;">
                            <i class="fas fa-search text-muted fs-1 mb-3"></i>
                            <h4 class="text-muted">No results found</h4>
                            <p class="text-muted">Try adjusting your search or filters</p>
                        </div>

                        <!-- Initial State -->
                        <div class="text-center py-5" id="initialState">
                            <i class="fas fa-search text-muted fs-1 mb-3"></i>
                            <h4 class="text-muted">Start searching</h4>
                            <p class="text-muted">Find topics, resources, notes, and more</p>

                            <!-- Popular Searches -->
                            <div class="mt-4">
                                <h6 class="text-muted mb-3">Popular searches:</h6>
                                <div class="d-flex flex-wrap gap-2 justify-content-center">
                                    <button class="btn btn-outline-secondary rounded-pill"
                                        onclick="quickSearch('Binary Trees')">
                                        Binary Trees
                                    </button>
                                    <button class="btn btn-outline-secondary rounded-pill"
                                        onclick="quickSearch('Dynamic Programming')">
                                        Dynamic Programming
                                    </button>
                                    <button class="btn btn-outline-secondary rounded-pill"
                                        onclick="quickSearch('Graph Algorithms')">
                                        Graph Algorithms
                                    </button>
                                    <button class="btn btn-outline-secondary rounded-pill"
                                        onclick="quickSearch('Sorting')">
                                        Sorting
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-bottom-nav d-lg-none position-fixed bottom-0 start-0 end-0 bg-white shadow-lg">
        <!-- Same structure -->
    </nav>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/search.js"></script>
</body>

</html>
