<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Calendar - DSA Mastery</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- FullCalendar -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/theme.css">
</head>

<body class="bg-gray-50">

    <!-- Include Sidebar -->
    <aside class="sidebar d-none d-lg-block position-fixed top-0 start-0 h-100 bg-white shadow-sm"
        style="width: 250px; z-index: 1000;">
        <!-- Same sidebar structure -->
    </aside>

    <!-- Main Content -->
    <main class="main-content" style="margin-left: 250px;">
        <!-- Top Navigation -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
            <!-- Same navigation -->
        </nav>

        <!-- Calendar Content -->
        <div class="container-fluid p-4">
            <!-- Header -->
            <div class="row mb-4">
                <div class="col-12">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h1 class="h3 fw-bold mb-1">Study Calendar</h1>
                            <p class="text-muted mb-0">Plan and track your study sessions</p>
                        </div>
                        <button class="btn btn-primary rounded-pill" data-bs-toggle="modal"
                            data-bs-target="#addEventModal">
                            <i class="fas fa-plus me-2"></i> Add Event
                        </button>
                    </div>
                </div>
            </div>

            <!-- Calendar Views -->
            <div class="row">
                <div class="col-lg-9 mb-4">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4">
                            <div id="fullCalendar"></div>
                        </div>
                    </div>
                </div>

                <!-- Sidebar Info -->
                <div class="col-lg-3 mb-4">
                    <!-- Today's Schedule -->
                    <div class="card border-0 shadow-sm rounded-4 mb-4">
                        <div class="card-body p-4">
                            <h5 class="fw-bold mb-3">Today's Schedule</h5>
                            <div class="schedule-list">
                                <div class="schedule-item d-flex align-items-start mb-3">
                                    <div class="time-slot me-3">
                                        <small class="text-muted">09:00 AM</small>
                                    </div>
                                    <div class="flex-grow-1">
                                        <h6 class="mb-1">Binary Trees Study</h6>
                                        <small class="text-muted">2 hours session</small>
                                    </div>
                                </div>
                                <div class="schedule-item d-flex align-items-start mb-3">
                                    <div class="time-slot me-3">
                                        <small class="text-muted">02:00 PM</small>
                                    </div>
                                    <div class="flex-grow-1">
                                        <h6 class="mb-1">Practice Problems</h6>
                                        <small class="text-muted">1 hour session</small>
                                    </div>
                                </div>
                                <div class="schedule-item d-flex align-items-start">
                                    <div class="time-slot me-3">
                                        <small class="text-muted">07:00 PM</small>
                                    </div>
                                    <div class="flex-grow-1">
                                        <h6 class="mb-1">Review & Notes</h6>
                                        <small class="text-muted">30 minutes</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Study Goals -->
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4">
                            <h5 class="fw-bold mb-3">Weekly Goals</h5>
                            <div class="goal-item mb-3">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <span>Study Time</span>
                                    <span class="fw-bold">12/20 hrs</span>
                                </div>
                                <div class="progress" style="height: 8px;">
                                    <div class="progress-bar bg-primary" style="width: 60%"></div>
                                </div>
                            </div>
                            <div class="goal-item mb-3">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <span>Topics</span>
                                    <span class="fw-bold">4/7</span>
                                </div>
                                <div class="progress" style="height: 8px;">
                                    <div class="progress-bar bg-success" style="width: 57%"></div>
                                </div>
                            </div>
                            <div class="goal-item">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <span>Problems</span>
                                    <span class="fw-bold">15/25</span>
                                </div>
                                <div class="progress" style="height: 8px;">
                                    <div class="progress-bar bg-warning" style="width: 60%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Add Event Modal -->
    <div class="modal fade" id="addEventModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Add Study Session</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addEventForm">
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" class="form-control" name="title" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Event Type</label>
                            <select class="form-select" name="event_type">
                                <option value="study">Study Session</option>
                                <option value="practice">Practice</option>
                                <option value="project">Project Work</option>
                                <option value="review">Review</option>
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Start Date & Time</label>
                                <input type="datetime-local" class="form-control" name="start_time" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">End Date & Time</label>
                                <input type="datetime-local" class="form-control" name="end_time" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" name="description" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Color</label>
                            <div class="d-flex gap-2">
                                <button type="button" class="btn color-picker" style="background: #3B82F6;"
                                    data-color="#3B82F6"></button>
                                <button type="button" class="btn color-picker" style="background: #10B981;"
                                    data-color="#10B981"></button>
                                <button type="button" class="btn color-picker" style="background: #F59E0B;"
                                    data-color="#F59E0B"></button>
                                <button type="button" class="btn color-picker" style="background: #EF4444;"
                                    data-color="#EF4444"></button>
                                <button type="button" class="btn color-picker" style="background: #8B5CF6;"
                                    data-color="#8B5CF6"></button>
                            </div>
                            <input type="hidden" name="color" value="#3B82F6">
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="recurring" id="recurring">
                                <label class="form-check-label" for="recurring">
                                    Repeat weekly
                                </label>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveEvent()">Save Event</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/calendar.js"></script>

    <style>
        .color-picker {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .color-picker:hover,
        .color-picker.active {
            border-color: #000;
        }

        .time-slot {
            min-width: 70px;
        }
    </style>
</body>

</html>
