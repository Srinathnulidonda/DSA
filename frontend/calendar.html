<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - DSA Learning</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/mobile.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="font-inter bg-gray-50 dark:bg-gray-900">

    <!-- Top Navigation -->
    <nav class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 fixed top-0 w-full z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <button id="mobileMenuToggle"
                        class="md:hidden p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700">
                        <i class="bi bi-list text-xl"></i>
                    </button>

                    <div class="flex-shrink-0 flex items-center ml-4 md:ml-0">
                        <h1 class="text-xl font-bold text-gray-900 dark:text-white">DSA Learning</h1>
                    </div>

                    <div class="hidden md:ml-10 md:flex md:space-x-8">
                        <a href="dashboard.html"
                            class="border-transparent text-gray-500 dark:text-gray-300 hover:border-gray-300 hover:text-gray-700 dark:hover:text-white inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
                            Dashboard
                        </a>
                        <a href="roadmap.html"
                            class="border-transparent text-gray-500 dark:text-gray-300 hover:border-gray-300 hover:text-gray-700 dark:hover:text-white inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
                            Roadmap
                        </a>
                        <a href="progress.html"
                            class="border-transparent text-gray-500 dark:text-gray-300 hover:border-gray-300 hover:text-gray-700 dark:hover:text-white inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
                            Progress
                        </a>
                        <a href="calendar.html"
                            class="border-blue-500 text-gray-900 dark:text-white inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
                            Calendar
                        </a>
                    </div>
                </div>

                <div class="flex items-center space-x-4">
                    <button id="themeToggle" class="p-2 text-gray-400 hover:text-gray-500 dark:hover:text-gray-300">
                        <i class="bi bi-sun text-xl dark:hidden"></i>
                        <i class="bi bi-moon text-xl hidden dark:block"></i>
                    </button>

                    <div class="relative">
                        <button id="profileToggle"
                            class="flex items-center space-x-2 p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
                            <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=3b82f6&color=fff"
                                alt="Profile" class="w-8 h-8 rounded-full">
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-16 pb-20 md:pb-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

            <!-- Header -->
            <div class="mb-8">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between">
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Study Calendar</h1>
                        <p class="mt-2 text-gray-600 dark:text-gray-400">Plan and track your learning sessions</p>
                    </div>

                    <div class="mt-4 sm:mt-0 flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-3">
                        <button id="addEventBtn"
                            class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                            <i class="bi bi-plus mr-2"></i>Add Event
                        </button>
                        <div class="flex space-x-2">
                            <button id="monthViewBtn"
                                class="px-3 py-2 text-sm font-medium bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-300 rounded-lg">
                                Month
                            </button>
                            <button id="weekViewBtn"
                                class="px-3 py-2 text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                                Week
                            </button>
                            <button id="dayViewBtn"
                                class="px-3 py-2 text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                                Day
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Calendar Navigation -->
            <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-6 mb-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center space-x-4">
                        <button id="prevMonth"
                            class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">
                            <i class="bi bi-chevron-left text-gray-600 dark:text-gray-400"></i>
                        </button>
                        <h2 id="currentMonth" class="text-xl font-semibold text-gray-900 dark:text-white">Loading...
                        </h2>
                        <button id="nextMonth"
                            class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">
                            <i class="bi bi-chevron-right text-gray-600 dark:text-gray-400"></i>
                        </button>
                    </div>

                    <button id="todayBtn"
                        class="px-4 py-2 text-sm bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
                        Today
                    </button>
                </div>

                <!-- Calendar Grid -->
                <div id="calendarGrid" class="grid grid-cols-7 gap-1">
                    <!-- Calendar will be generated here -->
                </div>
            </div>

            <!-- Upcoming Events -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Events List -->
                <div class="lg:col-span-2">
                    <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-6">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Upcoming Events</h3>
                            <div class="flex space-x-2">
                                <button id="filterAllBtn"
                                    class="px-3 py-1 text-xs bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-300 rounded-md">
                                    All
                                </button>
                                <button id="filterStudyBtn"
                                    class="px-3 py-1 text-xs text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md">
                                    Study
                                </button>
                                <button id="filterProjectBtn"
                                    class="px-3 py-1 text-xs text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md">
                                    Project
                                </button>
                                <button id="filterDeadlineBtn"
                                    class="px-3 py-1 text-xs text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md">
                                    Deadline
                                </button>
                            </div>
                        </div>

                        <div id="eventsList" class="space-y-4">
                            <!-- Events will be loaded here -->
                        </div>
                    </div>
                </div>

                <!-- Event Details & Quick Add -->
                <div class="space-y-6">
                    <!-- Today's Focus -->
                    <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-6">
                        <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Today's Focus</h3>
                        <div id="todaysFocus" class="space-y-3">
                            <!-- Today's events will be loaded here -->
                        </div>
                    </div>

                    <!-- Quick Add -->
                    <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-6">
                        <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Quick Add</h3>
                        <form id="quickAddForm" class="space-y-4">
                            <input type="text" id="quickTitle" placeholder="Event title..."
                                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white">

                            <div class="grid grid-cols-2 gap-2">
                                <input type="date" id="quickDate"
                                    class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white">
                                <input type="time" id="quickTime"
                                    class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white">
                            </div>

                            <select id="quickType"
                                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white">
                                <option value="study">Study Session</option>
                                <option value="project">Project Work</option>
                                <option value="deadline">Deadline</option>
                                <option value="review">Review</option>
                            </select>

                            <button type="submit"
                                class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 transition-colors">
                                Add Event
                            </button>
                        </form>
                    </div>

                    <!-- Calendar Stats -->
                    <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-6">
                        <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">This Month</h3>
                        <div class="space-y-3">
                            <div class="flex items-center justify-between">
                                <span class="text-sm text-gray-600 dark:text-gray-400">Study Sessions</span>
                                <span id="monthStudySessions" class="font-medium text-gray-900 dark:text-white">0</span>
                            </div>
                            <div class="flex items-center justify-between">
                                <span class="text-sm text-gray-600 dark:text-gray-400">Project Hours</span>
                                <span id="monthProjectHours" class="font-medium text-gray-900 dark:text-white">0h</span>
                            </div>
                            <div class="flex items-center justify-between">
                                <span class="text-sm text-gray-600 dark:text-gray-400">Completed</span>
                                <span id="monthCompleted"
                                    class="font-medium text-green-600 dark:text-green-400">0</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Mobile Bottom Navigation -->
    <nav
        class="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 z-30">
        <div class="grid grid-cols-5">
            <a href="dashboard.html"
                class="flex flex-col items-center justify-center py-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                <i class="bi bi-house text-xl mb-1"></i>
                <span class="text-xs font-medium">Home</span>
            </a>
            <a href="roadmap.html"
                class="flex flex-col items-center justify-center py-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                <i class="bi bi-map text-xl mb-1"></i>
                <span class="text-xs font-medium">Roadmap</span>
            </a>
            <a href="pomodoro.html"
                class="flex flex-col items-center justify-center py-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                <i class="bi bi-clock text-xl mb-1"></i>
                <span class="text-xs font-medium">Timer</span>
            </a>
            <a href="progress.html"
                class="flex flex-col items-center justify-center py-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                <i class="bi bi-graph-up text-xl mb-1"></i>
                <span class="text-xs font-medium">Progress</span>
            </a>
            <a href="profile.html"
                class="flex flex-col items-center justify-center py-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                <i class="bi bi-person text-xl mb-1"></i>
                <span class="text-xs font-medium">Profile</span>
            </a>
        </div>
    </nav>

    <!-- Add Event Modal -->
    <div id="addEventModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl max-w-md w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                <h3 class="text-xl font-semibold text-gray-900 dark:text-white">Add New Event</h3>
                <button id="closeEventModal" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>

            <form id="addEventForm" class="p-6 space-y-4">
                <div>
                    <label for="eventTitle"
                        class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Title</label>
                    <input type="text" id="eventTitle" name="title" required
                        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white">
                </div>

                <div>
                    <label for="eventDescription"
                        class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Description</label>
                    <textarea id="eventDescription" name="description" rows="3"
                        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="eventStartDate"
                            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Start Date</label>
                        <input type="date" id="eventStartDate" name="startDate" required
                            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white">
                    </div>
                    <div>
                        <label for="eventStartTime"
                            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Start Time</label>
                        <input type="time" id="eventStartTime" name="startTime" required
                            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="eventEndDate"
                            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">End Date</label>
                        <input type="date" id="eventEndDate" name="endDate" required
                            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white">
                    </div>
                    <div>
                        <label for="eventEndTime"
                            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">End Time</label>
                        <input type="time" id="eventEndTime" name="endTime" required
                            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white">
                    </div>
                </div>

                <div>
                    <label for="eventType"
                        class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Type</label>
                    <select id="eventType" name="eventType" required
                        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white">
                        <option value="study">Study Session</option>
                        <option value="project">Project Work</option>
                        <option value="deadline">Deadline</option>
                        <option value="review">Review</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div>
                    <label for="eventColor"
                        class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Color</label>
                    <div class="flex space-x-2">
                        <input type="color" id="eventColor" name="color" value="#3B82F6"
                            class="w-12 h-10 border border-gray-300 dark:border-gray-600 rounded-lg">
                        <input type="text" id="eventColorText" value="#3B82F6"
                            class="flex-1 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white">
                    </div>
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="eventRecurring" name="recurring"
                        class="rounded border-gray-300 text-blue-600 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50">
                    <label for="eventRecurring" class="ml-2 text-sm text-gray-600 dark:text-gray-400">Recurring
                        event</label>
                </div>

                <div class="flex space-x-3 pt-4">
                    <button type="button" id="cancelEvent"
                        class="flex-1 px-4 py-2 text-gray-700 dark:text-gray-300 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700">
                        Cancel
                    </button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                        Create Event
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Event Detail Modal -->
    <div id="eventDetailModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl max-w-md w-full">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                <h3 id="eventDetailTitle" class="text-xl font-semibold text-gray-900 dark:text-white">Event Details</h3>
                <button id="closeEventDetailModal" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>

            <div class="p-6" id="eventDetailContent">
                <!-- Event details will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
    <script src="js/calendar.js"></script>
</body>

</html>
