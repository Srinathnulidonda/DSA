<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DSA Mastery</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/animations.css">
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-vh-100 d-flex align-items-center">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="card border-0 shadow-lg rounded-4 animate-fadeInUp">
                    <div class="card-body p-5">
                        <!-- Logo -->
                        <div class="text-center mb-4">
                            <img src="assets/images/logo.svg" alt="DSA Mastery" style="width: 60px;" class="mb-3">
                            <h3 class="fw-bold">Welcome Back!</h3>
                            <p class="text-muted">Login to continue your learning journey</p>
                        </div>

                        <!-- Login Form -->
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email or Username</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="fas fa-user text-muted"></i>
                                    </span>
                                    <input type="text" class="form-control border-start-0" id="email" name="email"
                                        required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <label for="password" class="form-label mb-0">Password</label>
                                    <a href="forgot-password.html"
                                        class="text-primary text-decoration-none small">Forgot password?</a>
                                </div>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="fas fa-lock text-muted"></i>
                                    </span>
                                    <input type="password" class="form-control border-start-0 border-end-0"
                                        id="password" name="password" required>
                                    <button class="btn btn-light border-start-0 toggle-password" type="button">
                                        <i class="fas fa-eye text-muted"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="rememberMe">
                                    <label class="form-check-label" for="rememberMe">
                                        Remember me
                                    </label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill mb-3">
                                <i class="fas fa-sign-in-alt me-2"></i> Login
                            </button>
                        </form>

                        <!-- Social Login -->
                        <div class="text-center mb-4">
                            <p class="text-muted mb-3">Or continue with</p>
                            <div class="d-flex gap-3 justify-content-center">
                                <button class="btn btn-outline-secondary rounded-circle"
                                    style="width: 50px; height: 50px;" onclick="loginWithGoogle()">
                                    <i class="fab fa-google"></i>
                                </button>
                                <button class="btn btn-outline-secondary rounded-circle"
                                    style="width: 50px; height: 50px;" onclick="loginWithGitHub()">
                                    <i class="fab fa-github"></i>
                                </button>
                                <button class="btn btn-outline-secondary rounded-circle"
                                    style="width: 50px; height: 50px;">
                                    <i class="fab fa-linkedin"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Register Link -->
                        <div class="text-center">
                            <p class="mb-0">Don't have an account? <a href="register.html"
                                    class="text-primary text-decoration-none fw-semibold">Sign up</a></p>
                        </div>
                    </div>
                </div>

                <!-- Demo Credentials -->
                <div class="text-center mt-4">
                    <small class="text-muted">
                        Demo: demo@example.com / password123
                    </small>
                </div>
            </div>
        </div>
    </div>

    <!-- Global Loader -->
    <div id="globalLoader"
        class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center bg-white bg-opacity-75"
        style="z-index: 9999; display: none;">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
