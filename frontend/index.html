<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Learning Dashboard - Master Data Structures & Algorithms</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon"
        href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzIiIGhlaWdodD0iMzIiIHZpZXdCb3g9IjAgMCAzMiAzMiIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHBhdGggZD0iTTE2IDJMMjggMTZMMTYgMzBMNCAMTZMMTYgMloiIGZpbGw9IiM2MzY2RjEiLz4KPHBhdGggZD0iTTE2IDhMMjIgMTZMMTYgMjRMMTAgMTZMMTYgOFoiIGZpbGw9IndoaXRlIi8+Cjwvc3ZnPgo=" />

    <!-- Meta Tags -->
    <meta name="description"
        content="Complete 14-week DSA roadmap with interactive learning, progress tracking, and real-time analytics">
    <meta name="keywords" content="DSA, Data Structures, Algorithms, Learning, Programming, Computer Science">
    <meta name="author" content="DSA Learning Platform">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        accent: '#06b6d4',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444'
                    }
                }
            }
        }
    </script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/theme.css">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>

    <!-- Chart.js for Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- FullCalendar for Calendar View -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.js'></script>
</head>

<body class="bg-gray-50 dark:bg-gray-900">
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-logo">
                <i class="fas fa-code text-6xl text-primary mb-4"></i>
            </div>
            <div class="loading-text">
                <h3 class="text-xl font-bold text-gray-800 dark:text-white mb-2">DSA Learning Dashboard</h3>
                <p class="text-gray-600 dark:text-gray-300">Loading your learning journey...</p>
            </div>
            <div class="loading-spinner mt-4">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="modal fade" id="authModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-body p-0" id="authModalContent">
                    <!-- Auth content will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app" class="d-none">
        <!-- Navigation -->
        <nav id="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm fixed-top">
            <!-- Navbar content will be loaded here -->
        </nav>

        <!-- Sidebar for Desktop -->
        <div id="sidebar" class="sidebar d-none d-lg-block">
            <!-- Sidebar content will be loaded here -->
        </div>

        <!-- Main Content -->
        <main id="mainContent" class="main-content">
            <div class="container-fluid">
                <!-- Content will be dynamically loaded here -->
                <div id="pageContent"></div>
            </div>
        </main>

        <!-- Mobile Bottom Navigation -->
        <nav id="bottomNav" class="bottom-nav d-lg-none">
            <!-- Bottom nav content will be loaded here -->
        </nav>

        <!-- Floating Action Button -->
        <div id="fab" class="fab-container">
            <button class="fab-button" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="fas fa-plus"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end fab-menu">
                <li><a class="dropdown-item" href="#" onclick="openNoteModal()"><i
                            class="fas fa-sticky-note me-2"></i>Add Note</a></li>
                <li><a class="dropdown-item" href="#" onclick="openEventModal()"><i
                            class="fas fa-calendar-plus me-2"></i>Add Event</a></li>
                <li><a class="dropdown-item" href="#" onclick="markTopicComplete()"><i
                            class="fas fa-check me-2"></i>Mark Complete</a></li>
            </ul>
        </div>

        <!-- Notification Toast Container -->
        <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">
            <div id="notificationToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
                <div class="toast-header">
                    <i class="fas fa-bell text-primary me-2"></i>
                    <strong class="me-auto">Notification</strong>
                    <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
                <div class="toast-body" id="toastMessage">
                    <!-- Notification message -->
                </div>
            </div>
        </div>

        <!-- Motivational Modal -->
        <div class="modal fade" id="motivationalModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 bg-gradient-to-r from-purple-500 to-pink-500 text-white">
                    <div class="modal-body text-center p-5">
                        <i class="fas fa-trophy text-6xl mb-4"></i>
                        <h3 id="motivationalTitle" class="mb-3">Achievement Unlocked!</h3>
                        <p id="motivationalMessage" class="mb-4"></p>
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Awesome!</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- DSA Glossary Modal -->
        <div class="modal fade" id="glossaryModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-scrollable">
                <div class="modal-content" id="glossaryModalContent">
                    <!-- Glossary content will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Pomodoro Timer Modal -->
        <div class="modal fade" id="pomodoroModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content" id="pomodoroModalContent">
                    <!-- Pomodoro content will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div class="modal fade" id="settingsModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-scrollable">
                <div class="modal-content" id="settingsModalContent">
                    <!-- Settings content will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/local-storage.js"></script>
    <script src="js/authentication.js"></script>
    <script src="js/notes.js"></script>
    <script src="js/main.js"></script>

    <script>
        // Initialize the application
        document.addEventListener('DOMContentLoaded', function () {
            console.log('🚀 DSA Learning Dashboard Starting...');

            // Initialize Firebase
            if (typeof firebase !== 'undefined') {
                initializeFirebase();
            }

            // Initialize the app
            window.DSAApp = new DSALearningApp();
            window.DSAApp.init();
        });
    </script>
</body>

</html>
