<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - DSA Mastery</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/theme.css">
</head>

<body class="bg-gray-50">

    <!-- Include Sidebar -->
    <aside class="sidebar d-none d-lg-block position-fixed top-0 start-0 h-100 bg-white shadow-sm"
        style="width: 250px; z-index: 1000;">
        <!-- Same sidebar structure -->
    </aside>

    <!-- Main Content -->
    <main class="main-content" style="margin-left: 250px;">
        <!-- Top Navigation -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
            <!-- Same navigation -->
        </nav>

        <!-- Settings Content -->
        <div class="container-fluid p-4">
            <!-- Header -->
            <div class="row mb-4">
                <div class="col-12">
                    <h1 class="h3 fw-bold mb-1">Settings</h1>
                    <p class="text-muted mb-0">Manage your account and preferences</p>
                </div>
            </div>

            <!-- Settings Tabs -->
            <div class="row">
                <div class="col-lg-3 mb-4">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4">
                            <nav class="nav nav-pills flex-column">
                                <a class="nav-link active rounded-3 mb-2" data-bs-toggle="pill" href="#account">
                                    <i class="fas fa-user me-3"></i> Account
                                </a>
                                <a class="nav-link rounded-3 mb-2" data-bs-toggle="pill" href="#preferences">
                                    <i class="fas fa-cog me-3"></i> Preferences
                                </a>
                                <a class="nav-link rounded-3 mb-2" data-bs-toggle="pill" href="#notifications">
                                    <i class="fas fa-bell me-3"></i> Notifications
                                </a>
                                <a class="nav-link rounded-3 mb-2" data-bs-toggle="pill" href="#privacy">
                                    <i class="fas fa-lock me-3"></i> Privacy
                                </a>
                                <a class="nav-link rounded-3 mb-2" data-bs-toggle="pill" href="#data">
                                    <i class="fas fa-database me-3"></i> Data & Storage
                                </a>
                            </nav>
                        </div>
                    </div>
                </div>

                <div class="col-lg-9">
                    <div class="tab-content">
                        <!-- Account Settings -->
                        <div class="tab-pane fade show active" id="account">
                            <div class="card border-0 shadow-sm rounded-4">
                                <div class="card-body p-4">
                                    <h5 class="fw-bold mb-4">Account Settings</h5>

                                    <div class="mb-4">
                                        <label class="form-label">Username</label>
                                        <input type="text" class="form-control" value="johndoe">
                                    </div>

                                    <div class="mb-4">
                                        <label class="form-label">Email Address</label>
                                        <input type="email" class="form-control" value="john.doe@example.com">
                                    </div>

                                    <div class="mb-4">
                                        <label class="form-label">Change Password</label>
                                        <button class="btn btn-outline-primary d-block">Change Password</button>
                                    </div>

                                    <div class="mb-4">
                                        <label class="form-label">Two-Factor Authentication</label>
                                        <div class="form-check form-switch">
                                            <input class="form-check-input" type="checkbox" id="2fa">
                                            <label class="form-check-label" for="2fa">
                                                Enable two-factor authentication
                                            </label>
                                        </div>
                                    </div>

                                    <button class="btn btn-primary">Save Changes</button>
                                </div>
                            </div>
                        </div>

                        <!-- Preferences -->
                        <div class="tab-pane fade" id="preferences">
                            <div class="card border-0 shadow-sm rounded-4">
                                <div class="card-body p-4">
                                    <h5 class="fw-bold mb-4">Learning Preferences</h5>

                                    <div class="mb-4">
                                        <label class="form-label">Theme</label>
                                        <select class="form-select">
                                            <option>Light</option>
                                            <option>Dark</option>
                                            <option>Auto</option>
                                        </select>
                                    </div>

                                    <div class="mb-4">
                                        <label class="form-label">Preferred Language</label>
                                        <select class="form-select">
                                            <option>Python</option>
                                            <option>C++</option>
                                            <option>Java</option>
                                            <option>JavaScript</option>
                                        </select>
                                    </div>

                                    <div class="mb-4">
                                        <label class="form-label">Daily Study Goal</label>
                                        <div class="input-group">
                                            <input type="number" class="form-control" value="120">
                                            <span class="input-group-text">minutes</span>
                                        </div>
                                    </div>

                                    <div class="mb-4">
                                        <label class="form-label">Layout</label>
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="layout" id="default"
                                                checked>
                                            <label class="form-check-label" for="default">
                                                Default
                                            </label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="layout" id="compact">
                                            <label class="form-check-label" for="compact">
                                                Compact
                                            </label>
                                        </div>
                                    </div>

                                    <button class="btn btn-primary">Save Preferences</button>
                                </div>
                            </div>
                        </div>

                        <!-- Notifications -->
                        <div class="tab-pane fade" id="notifications">
                            <div class="card border-0 shadow-sm rounded-4">
                                <div class="card-body p-4">
                                    <h5 class="fw-bold mb-4">Notification Settings</h5>

                                    <div class="mb-4">
                                        <h6 class="fw-semibold mb-3">Email Notifications</h6>
                                        <div class="form-check form-switch mb-2">
                                            <input class="form-check-input" type="checkbox" id="emailProgress" checked>
                                            <label class="form-check-label" for="emailProgress">
                                                Weekly progress reports
                                            </label>
                                        </div>
                                        <div class="form-check form-switch mb-2">
                                            <input class="form-check-input" type="checkbox" id="emailStreak" checked>
                                            <label class="form-check-label" for="emailStreak">
                                                Streak reminders
                                            </label>
                                        </div>
                                        <div class="form-check form-switch mb-2">
                                            <input class="form-check-input" type="checkbox" id="emailAchieve">
                                            <label class="form-check-label" for="emailAchieve">
                                                Achievement unlocked
                                            </label>
                                        </div>
                                    </div>

                                    <div class="mb-4">
                                        <h6 class="fw-semibold mb-3">Push Notifications</h6>
                                        <div class="form-check form-switch mb-2">
                                            <input class="form-check-input" type="checkbox" id="pushStudy" checked>
                                            <label class="form-check-label" for="pushStudy">
                                                Study reminders
                                            </label>
                                        </div>
                                        <div class="form-check form-switch mb-2">
                                            <input class="form-check-input" type="checkbox" id="pushPomodoro" checked>
                                            <label class="form-check-label" for="pushPomodoro">
                                                Pomodoro timer alerts
                                            </label>
                                        </div>
                                    </div>

                                    <button class="btn btn-primary">Save Notifications</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/settings.js"></script>
</body>

</html>
