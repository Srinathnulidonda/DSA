<!-- Progress Bar Component -->
<div class="progress-bar-component">
    <!-- Circular Progress -->
    <div class="circular-progress mb-3">
        <svg width="120" height="120" class="circular-progress-svg">
            <defs>
                <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
                </linearGradient>
            </defs>
            <circle cx="60" cy="60" r="50" class="circular-progress-bg"></circle>
            <circle cx="60" cy="60" r="50" class="circular-progress-bar" stroke-dasharray="314" stroke-dashoffset="314"
                id="progressCircle"></circle>
        </svg>
        <div class="circular-progress-text" id="progressText">0%</div>
    </div>

    <!-- Linear Progress Bars -->
    <div class="linear-progress-container">
        <!-- Overall Progress -->
        <div class="progress-item mb-3">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <label class="form-label small fw-semibold mb-0">Overall Progress</label>
                <span class="badge badge-primary" id="overallProgressText">0%</span>
            </div>
            <div class="progress progress-enhanced">
                <div class="progress-bar progress-bar-enhanced animate-gradient" role="progressbar" style="width: 0%"
                    id="overallProgressBar"></div>
            </div>
        </div>

        <!-- Weekly Progress -->
        <div class="progress-item mb-3">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <label class="form-label small fw-semibold mb-0">This Week</label>
                <span class="badge badge-success-gradient" id="weekProgressText">0%</span>
            </div>
            <div class="progress progress-enhanced">
                <div class="progress-bar bg-success progress-bar-enhanced" role="progressbar" style="width: 0%"
                    id="weekProgressBar"></div>
            </div>
        </div>

        <!-- Daily Goal -->
        <div class="progress-item mb-3">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <label class="form-label small fw-semibold mb-0">Daily Goal</label>
                <span class="badge badge-warning-gradient" id="dailyGoalText">0%</span>
            </div>
            <div class="progress progress-enhanced">
                <div class="progress-bar bg-warning progress-bar-enhanced" role="progressbar" style="width: 0%"
                    id="dailyGoalBar"></div>
            </div>
        </div>

        <!-- Study Time Goal -->
        <div class="progress-item">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <label class="form-label small fw-semibold mb-0">Study Time</label>
                <span class="badge badge-info" id="studyTimeText">0h / 2h</span>
            </div>
            <div class="progress progress-enhanced">
                <div class="progress-bar bg-info progress-bar-enhanced" role="progressbar" style="width: 0%"
                    id="studyTimeBar"></div>
            </div>
        </div>
    </div>

    <!-- Progress Stats -->
    <div class="progress-stats mt-4">
        <div class="row text-center">
            <div class="col-4">
                <div class="stat-item">
                    <div class="stat-number text-primary fw-bold" id="completedTopics">0</div>
                    <div class="stat-label small text-muted">Topics</div>
                </div>
            </div>
            <div class="col-4">
                <div class="stat-item">
                    <div class="stat-number text-success fw-bold" id="completedProjects">0</div>
                    <div class="stat-label small text-muted">Projects</div>
                </div>
            </div>
            <div class="col-4">
                <div class="stat-item">
                    <div class="stat-number text-warning fw-bold" id="solvedProblems">0</div>
                    <div class="stat-label small text-muted">Problems</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Progress Bar Component JavaScript
    class ProgressBarComponent {
        constructor(containerId) {
            this.container = document.getElementById(containerId);
            this.init();
        }

        init() {
            this.updateProgress(0, 0, 0, 0);
        }

        updateProgress(overall, weekly, daily, studyTime) {
            // Update circular progress
            const circle = document.getElementById('progressCircle');
            const progressText = document.getElementById('progressText');

            if (circle && progressText) {
                const circumference = 2 * Math.PI * 50;
                const offset = circumference - (overall / 100) * circumference;
                circle.style.strokeDashoffset = offset;
                progressText.textContent = `${Math.round(overall)}%`;
            }

            // Update linear progress bars
            this.updateLinearProgress('overallProgressBar', 'overallProgressText', overall);
            this.updateLinearProgress('weekProgressBar', 'weekProgressText', weekly);
            this.updateLinearProgress('dailyGoalBar', 'dailyGoalText', daily);
            this.updateLinearProgress('studyTimeBar', 'studyTimeText', studyTime, 'time');
        }

        updateLinearProgress(barId, textId, value, type = 'percentage') {
            const bar = document.getElementById(barId);
            const text = document.getElementById(textId);

            if (bar) {
                bar.style.width = `${Math.min(value, 100)}%`;
                bar.setAttribute('aria-valuenow', value);
            }

            if (text) {
                if (type === 'time') {
                    text.textContent = `${value}h / 2h`;
                } else {
                    text.textContent = `${Math.round(value)}%`;
                }
            }
        }

        updateStats(topics, projects, problems) {
            const topicsEl = document.getElementById('completedTopics');
            const projectsEl = document.getElementById('completedProjects');
            const problemsEl = document.getElementById('solvedProblems');

            if (topicsEl) topicsEl.textContent = topics;
            if (projectsEl) projectsEl.textContent = projects;
            if (problemsEl) problemsEl.textContent = problems;
        }

        animateProgress(targetOverall, targetWeekly, targetDaily, targetStudyTime) {
            const duration = 1000; // 1 second
            const steps = 60;
            const stepDuration = duration / steps;

            let currentStep = 0;
            const initialOverall = this.getCurrentProgress('overallProgressBar');
            const initialWeekly = this.getCurrentProgress('weekProgressBar');
            const initialDaily = this.getCurrentProgress('dailyGoalBar');
            const initialStudyTime = this.getCurrentProgress('studyTimeBar');

            const interval = setInterval(() => {
                currentStep++;
                const progress = currentStep / steps;

                const overall = initialOverall + (targetOverall - initialOverall) * progress;
                const weekly = initialWeekly + (targetWeekly - initialWeekly) * progress;
                const daily = initialDaily + (targetDaily - initialDaily) * progress;
                const studyTime = initialStudyTime + (targetStudyTime - initialStudyTime) * progress;

                this.updateProgress(overall, weekly, daily, studyTime);

                if (currentStep >= steps) {
                    clearInterval(interval);
                }
            }, stepDuration);
        }

        getCurrentProgress(barId) {
            const bar = document.getElementById(barId);
            if (bar) {
                return parseFloat(bar.getAttribute('aria-valuenow')) || 0;
            }
            return 0;
        }
    }

    // Initialize progress bar component if container exists
    document.addEventListener('DOMContentLoaded', function () {
        if (document.querySelector('.progress-bar-component')) {
            window.progressBarComponent = new ProgressBarComponent();
        }
    });
</script>
