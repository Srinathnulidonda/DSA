<!-- Notes Modal Component -->
<div class="modal fade modal-enhanced" id="notesModal" tabindex="-1" aria-labelledby="notesModalLabel"
    aria-hidden="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="notesModalLabel">
                    <i class="fas fa-sticky-note me-2"></i>Quick Notes
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-0">
                <div class="row g-0 h-100">
                    <!-- Notes Sidebar -->
                    <div class="col-md-4 border-end">
                        <div class="notes-sidebar p-3">
                            <!-- Search and Controls -->
                            <div class="notes-controls mb-3">
                                <div class="input-group input-group-sm mb-2">
                                    <input type="text" class="form-control" placeholder="Search notes..."
                                        id="modalNotesSearch">
                                    <button class="btn btn-outline-secondary" type="button">
                                        <i class="fas fa-search"></i>
                                    </button>
                                </div>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-primary btn-sm flex-fill" onclick="createQuickNote()">
                                        <i class="fas fa-plus me-1"></i>New Note
                                    </button>
                                    <div class="dropdown">
                                        <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button"
                                            data-bs-toggle="dropdown">
                                            <i class="fas fa-filter"></i>
                                        </button>
                                        <ul class="dropdown-menu">
                                            <li><a class="dropdown-item" href="#" onclick="filterModalNotes('all')">All
                                                    Notes</a></li>
                                            <li><a class="dropdown-item" href="#"
                                                    onclick="filterModalNotes('pinned')">Pinned</a></li>
                                            <li><a class="dropdown-item" href="#"
                                                    onclick="filterModalNotes('recent')">Recent</a></li>
                                            <li>
                                                <hr class="dropdown-divider">
                                            </li>
                                            <li><a class="dropdown-item" href="#"
                                                    onclick="filterModalNotes('week')">This Week</a></li>
                                        </ul>
                                    </div>
                                </div>
                            </div>

                            <!-- Notes List -->
                            <div class="notes-list" id="modalNotesList" style="max-height: 400px; overflow-y: auto;">
                                <!-- Dynamic notes content -->
                            </div>
                        </div>
                    </div>

                    <!-- Note Editor -->
                    <div class="col-md-8">
                        <div class="note-editor p-3">
                            <!-- Editor Header -->
                            <div class="editor-header mb-3">
                                <div class="d-flex justify-content-between align-items-center">
                                    <input type="text" class="form-control form-control-sm fw-bold border-0 fs-5"
                                        placeholder="Note title..." id="modalNoteTitle"
                                        style="background: transparent;">
                                    <div class="editor-controls">
                                        <button class="btn btn-outline-secondary btn-sm me-1"
                                            onclick="toggleModalNotePin()" id="modalPinButton">
                                            <i class="far fa-thumbtack"></i>
                                        </button>
                                        <button class="btn btn-outline-danger btn-sm" onclick="deleteModalNote()"
                                            id="modalDeleteButton">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="note-meta small text-muted mt-1" id="modalNoteMeta">
                                    Select a note to edit or create a new one
                                </div>
                            </div>

                            <!-- Markdown Toolbar -->
                            <div class="markdown-toolbar mb-2">
                                <div class="btn-group btn-group-sm" role="group">
                                    <button type="button" class="btn btn-outline-secondary"
                                        onclick="insertModalMarkdown('**', '**')" title="Bold">
                                        <i class="fas fa-bold"></i>
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary"
                                        onclick="insertModalMarkdown('*', '*')" title="Italic">
                                        <i class="fas fa-italic"></i>
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary"
                                        onclick="insertModalMarkdown('`', '`')" title="Code">
                                        <i class="fas fa-code"></i>
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary"
                                        onclick="insertModalMarkdown('\n```\n', '\n```\n')" title="Code Block">
                                        <i class="fas fa-file-code"></i>
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary"
                                        onclick="insertModalMarkdown('[', '](url)')" title="Link">
                                        <i class="fas fa-link"></i>
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary"
                                        onclick="insertModalMarkdown('\n- ', '')" title="List">
                                        <i class="fas fa-list"></i>
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary"
                                        onclick="toggleModalPreview()" title="Preview" id="modalPreviewToggle">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <div class="btn-group btn-group-sm ms-2" role="group">
                                    <button type="button" class="btn btn-outline-success" onclick="saveModalNote()"
                                        title="Save">
                                        <i class="fas fa-save"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Editor Content -->
                            <div class="editor-content">
                                <textarea class="form-control" rows="15" placeholder="Start writing your notes..."
                                    id="modalNoteContent"></textarea>
                                <div class="markdown-preview border rounded p-3 d-none" id="modalMarkdownPreview"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <div class="d-flex justify-content-between w-100">
                    <div class="note-stats small text-muted">
                        <span id="modalWordCount">0 words</span> •
                        <span id="modalCharCount">0 characters</span>
                    </div>
                    <div>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-primary" onclick="saveModalNote()">
                            <i class="fas fa-save me-1"></i>Save Note
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Modal Notes Functionality
    let currentModalNote = null;
    let modalAutoSaveTimer = null;

    function createQuickNote() {
        const newNote = {
            id: Date.now().toString(),
            title: 'Quick Note',
            content: '',
            category: 'General',
            isPinned: false,
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
        };

        // Add to notes manager if available
        if (window.notesManager) {
            window.notesManager.notes.unshift(newNote);
            window.notesManager.saveNotes();
        }

        loadModalNotesList();
        selectModalNote(newNote.id);
    }

    function loadModalNotesList() {
        const container = document.getElementById('modalNotesList');
        if (!container) return;

        const notes = window.notesManager ? window.notesManager.notes : [];

        if (notes.length === 0) {
            container.innerHTML = `
            <div class="text-center py-4 text-muted">
                <i class="fas fa-sticky-note fa-2x mb-2"></i>
                <p>No notes yet</p>
                <button class="btn btn-sm btn-primary" onclick="createQuickNote()">
                    Create First Note
                </button>
            </div>
        `;
            return;
        }

        container.innerHTML = notes.map(note => `
        <div class="note-item-modal p-2 mb-2 border rounded cursor-pointer ${currentModalNote?.id === note.id ? 'border-primary bg-light' : ''}" 
             onclick="selectModalNote('${note.id}')" data-note-id="${note.id}">
            <div class="d-flex justify-content-between align-items-start">
                <div class="flex-grow-1">
                    <div class="d-flex align-items-center mb-1">
                        ${note.isPinned ? '<i class="fas fa-thumbtack text-warning me-1"></i>' : ''}
                        <h6 class="mb-0 small fw-bold">${note.title}</h6>
                    </div>
                    <p class="mb-1 small text-muted">${getContentPreview(note.content, 60)}</p>
                    <small class="text-muted">${DSAUtils.getTimeAgo(note.updatedAt)}</small>
                </div>
            </div>
        </div>
    `).join('');
    }

    function selectModalNote(noteId) {
        const notes = window.notesManager ? window.notesManager.notes : [];
        const note = notes.find(n => n.id === noteId);

        if (note) {
            currentModalNote = note;
            loadModalNoteInEditor(note);
            updateModalNoteUI();
        }
    }

    function loadModalNoteInEditor(note) {
        const titleElement = document.getElementById('modalNoteTitle');
        const contentElement = document.getElementById('modalNoteContent');
        const metaElement = document.getElementById('modalNoteMeta');
        const pinButton = document.getElementById('modalPinButton');

        if (titleElement) titleElement.value = note.title;
        if (contentElement) contentElement.value = note.content;
        if (metaElement) {
            metaElement.textContent = `Created ${DSAUtils.formatDate(note.createdAt)} • Updated ${DSAUtils.getTimeAgo(note.updatedAt)}`;
        }
        if (pinButton) {
            pinButton.innerHTML = note.isPinned ? '<i class="fas fa-thumbtack"></i>' : '<i class="far fa-thumbtack"></i>';
        }

        updateModalWordCount();
    }

    function saveModalNote() {
        if (!currentModalNote) return;

        const titleElement = document.getElementById('modalNoteTitle');
        const contentElement = document.getElementById('modalNoteContent');

        if (titleElement && contentElement) {
            currentModalNote.title = titleElement.value || 'Untitled';
            currentModalNote.content = contentElement.value;
            currentModalNote.updatedAt = new Date().toISOString();

            if (window.notesManager) {
                const noteIndex = window.notesManager.notes.findIndex(n => n.id === currentModalNote.id);
                if (noteIndex !== -1) {
                    window.notesManager.notes[noteIndex] = currentModalNote;
                    window.notesManager.saveNotes();
                }
            }

            loadModalNotesList();
            showNotification('Note saved successfully!', 'success');
        }
    }

    function deleteModalNote() {
        if (!currentModalNote) return;

        if (confirm('Are you sure you want to delete this note?')) {
            if (window.notesManager) {
                window.notesManager.notes = window.notesManager.notes.filter(n => n.id !== currentModalNote.id);
                window.notesManager.saveNotes();
            }

            currentModalNote = null;
            clearModalEditor();
            loadModalNotesList();
            showNotification('Note deleted successfully!', 'success');
        }
    }

    function toggleModalNotePin() {
        if (!currentModalNote) return;

        currentModalNote.isPinned = !currentModalNote.isPinned;
        currentModalNote.updatedAt = new Date().toISOString();

        saveModalNote();
    }

    function clearModalEditor() {
        const titleElement = document.getElementById('modalNoteTitle');
        const contentElement = document.getElementById('modalNoteContent');
        const metaElement = document.getElementById('modalNoteMeta');

        if (titleElement) titleElement.value = '';
        if (contentElement) contentElement.value = '';
        if (metaElement) metaElement.textContent = 'Select a note to edit or create a new one';

        updateModalWordCount();
    }

    function updateModalNoteUI() {
        // Update active note highlighting
        document.querySelectorAll('.note-item-modal').forEach(item => {
            item.classList.remove('border-primary', 'bg-light');
        });

        if (currentModalNote) {
            const activeItem = document.querySelector(`[data-note-id="${currentModalNote.id}"]`);
            if (activeItem) {
                activeItem.classList.add('border-primary', 'bg-light');
            }
        }
    }

    function updateModalWordCount() {
        const contentElement = document.getElementById('modalNoteContent');
        const wordCountElement = document.getElementById('modalWordCount');
        const charCountElement = document.getElementById('modalCharCount');

        if (contentElement && wordCountElement && charCountElement) {
            const content = contentElement.value;
            const words = content.trim() ? content.trim().split(/\s+/).length : 0;
            const chars = content.length;

            wordCountElement.textContent = `${words} word${words !== 1 ? 's' : ''}`;
            charCountElement.textContent = `${chars} character${chars !== 1 ? 's' : ''}`;
        }
    }

    function insertModalMarkdown(before, after) {
        const textarea = document.getElementById('modalNoteContent');
        if (!textarea) return;

        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const selectedText = textarea.value.substring(start, end);

        const replacement = before + selectedText + after;
        textarea.setRangeText(replacement, start, end, 'end');

        updateModalWordCount();
        textarea.focus();

        // Auto-save
        if (modalAutoSaveTimer) clearTimeout(modalAutoSaveTimer);
        modalAutoSaveTimer = setTimeout(saveModalNote, 1000);
    }

    function toggleModalPreview() {
        const textarea = document.getElementById('modalNoteContent');
        const preview = document.getElementById('modalMarkdownPreview');
        const toggleButton = document.getElementById('modalPreviewToggle');

        if (!textarea || !preview || !toggleButton) return;

        if (preview.classList.contains('d-none')) {
            // Show preview
            preview.classList.remove('d-none');
            textarea.classList.add('d-none');
            toggleButton.innerHTML = '<i class="fas fa-edit"></i>';

            // Render markdown (simple implementation)
            preview.innerHTML = renderSimpleMarkdown(textarea.value);
        } else {
            // Show editor
            preview.classList.add('d-none');
            textarea.classList.remove('d-none');
            toggleButton.innerHTML = '<i class="fas fa-eye"></i>';
        }
    }

    function renderSimpleMarkdown(content) {
        return content
            .replace(/^# (.*$)/gim, '<h1>$1</h1>')
            .replace(/^## (.*$)/gim, '<h2>$1</h2>')
            .replace(/^### (.*$)/gim, '<h3>$1</h3>')
            .replace(/^\* (.*$)/gim, '<li>$1</li>')
            .replace(/^\- (.*$)/gim, '<li>$1</li>')
            .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
            .replace(/\*(.*)\*/gim, '<em>$1</em>')
            .replace(/`(.*?)`/gim, '<code>$1</code>')
            .replace(/```([\s\S]*?)```/gim, '<pre><code>$1</code></pre>')
            .replace(/\[([^\]]+)\]\(([^)]+)\)/gim, '<a href="$2" target="_blank">$1</a>')
            .replace(/\n/gim, '<br>');
    }

    function getContentPreview(content, maxLength = 100) {
        const plainText = content
            .replace(/#+\s/g, '')
            .replace(/\*\*(.*?)\*\*/g, '$1')
            .replace(/\*(.*?)\*/g, '$1')
            .replace(/`(.*?)`/g, '$1')
            .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
            .replace(/```[\s\S]*?```/g, '[Code Block]')
            .trim();

        return plainText.length > maxLength
            ? plainText.substring(0, maxLength) + '...'
            : plainText || 'Empty note';
    }

    // Event listeners
    document.addEventListener('DOMContentLoaded', function () {
        // Auto-save on content change
        const contentTextarea = document.getElementById('modalNoteContent');
        if (contentTextarea) {
            contentTextarea.addEventListener('input', function () {
                updateModalWordCount();

                if (modalAutoSaveTimer) clearTimeout(modalAutoSaveTimer);
                modalAutoSaveTimer = setTimeout(saveModalNote, 2000);
            });
        }

        // Auto-save on title change
        const titleInput = document.getElementById('modalNoteTitle');
        if (titleInput) {
            titleInput.addEventListener('input', function () {
                if (modalAutoSaveTimer) clearTimeout(modalAutoSaveTimer);
                modalAutoSaveTimer = setTimeout(saveModalNote, 1000);
            });
        }

        // Load notes when modal is shown
        const notesModal = document.getElementById('notesModal');
        if (notesModal) {
            notesModal.addEventListener('shown.bs.modal', function () {
                loadModalNotesList();
            });
        }
    });
</script>
