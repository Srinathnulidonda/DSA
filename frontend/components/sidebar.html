<!-- Sidebar Component for Mobile and Desktop -->
<div class="sidebar-component">
    <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarOffcanvas">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">
                <i class="fas fa-code me-2 text-primary"></i>
                DSA Mastery
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <!-- Navigation Links -->
            <div class="sidebar-section">
                <h6 class="sidebar-section-title">Navigation</h6>
                <ul class="sidebar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="#dashboard" onclick="showPage('dashboard')"
                            data-page="dashboard">
                            <i class="fas fa-home me-2"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#timetable" onclick="showPage('timetable')" data-page="timetable">
                            <i class="fas fa-calendar me-2"></i>Timetable
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#progress" onclick="showPage('progress')" data-page="progress">
                            <i class="fas fa-chart-line me-2"></i>Progress
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#projects" onclick="showPage('projects')" data-page="projects">
                            <i class="fas fa-project-diagram me-2"></i>Projects
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#notes" onclick="showPage('notes')" data-page="notes">
                            <i class="fas fa-sticky-note me-2"></i>Notes
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#resources" onclick="showPage('resources')" data-page="resources">
                            <i class="fas fa-book me-2"></i>Resources
                        </a>
                    </li>
                </ul>
            </div>

            <!-- Quick Stats -->
            <div class="sidebar-section">
                <h6 class="sidebar-section-title">Quick Stats</h6>
                <div class="quick-stats">
                    <div class="stat-item">
                        <div class="stat-icon">
                            <i class="fas fa-fire text-warning"></i>
                        </div>
                        <div class="stat-details">
                            <span class="stat-value" id="sidebar-streak">0</span>
                            <span class="stat-label">Day Streak</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon">
                            <i class="fas fa-trophy text-success"></i>
                        </div>
                        <div class="stat-details">
                            <span class="stat-value" id="sidebar-completed">0</span>
                            <span class="stat-label">Tasks Done</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon">
                            <i class="fas fa-project-diagram text-primary"></i>
                        </div>
                        <div class="stat-details">
                            <span class="stat-value" id="sidebar-projects">0</span>
                            <span class="stat-label">Projects</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Current Week Progress -->
            <div class="sidebar-section">
                <h6 class="sidebar-section-title">Current Week</h6>
                <div class="week-progress-sidebar">
                    <div class="week-info">
                        <span class="week-label" id="sidebar-week-label">Week 1</span>
                        <span class="week-percentage" id="sidebar-week-progress">0%</span>
                    </div>
                    <div class="progress progress-sm">
                        <div class="progress-bar" id="sidebar-week-bar" style="width: 0%"></div>
                    </div>
                    <div class="week-topic">
                        <small class="text-muted" id="sidebar-week-topic">Programming Fundamentals</small>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="sidebar-section">
                <h6 class="sidebar-section-title">Quick Actions</h6>
                <div class="quick-actions-sidebar">
                    <button class="btn btn-outline-primary btn-sm w-100 mb-2" onclick="startStudySession()">
                        <i class="fas fa-play me-1"></i>Start Study
                    </button>
                    <button class="btn btn-outline-success btn-sm w-100 mb-2" onclick="showAddNoteModal()">
                        <i class="fas fa-plus me-1"></i>Add Note
                    </button>
                    <button class="btn btn-outline-warning btn-sm w-100 mb-2" onclick="openRandomProblem()">
                        <i class="fas fa-random me-1"></i>Random Problem
                    </button>
                    <button class="btn btn-outline-info btn-sm w-100" onclick="showGlossaryModal()">
                        <i class="fas fa-search me-1"></i>Glossary
                    </button>
                </div>
            </div>

            <!-- Recent Achievements -->
            <div class="sidebar-section">
                <h6 class="sidebar-section-title">Recent Achievements</h6>
                <div class="recent-achievements" id="sidebar-achievements">
                    <div class="achievement-item">
                        <i class="fas fa-star text-warning me-2"></i>
                        <span class="achievement-text">No achievements yet</span>
                    </div>
                </div>
            </div>

            <!-- Study Timer -->
            <div class="sidebar-section">
                <h6 class="sidebar-section-title">Study Timer</h6>
                <div class="timer-sidebar">
                    <div class="timer-display-small">
                        <span id="sidebar-timer-minutes">25</span>:<span id="sidebar-timer-seconds">00</span>
                    </div>
                    <div class="timer-controls-small">
                        <button class="btn btn-success btn-sm" onclick="startTimer()" id="sidebar-timer-start">
                            <i class="fas fa-play"></i>
                        </button>
                        <button class="btn btn-warning btn-sm" onclick="pauseTimer()" id="sidebar-timer-pause">
                            <i class="fas fa-pause"></i>
                        </button>
                        <button class="btn btn-danger btn-sm" onclick="resetTimer()" id="sidebar-timer-reset">
                            <i class="fas fa-stop"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Settings -->
            <div class="sidebar-section">
                <h6 class="sidebar-section-title">Settings</h6>
                <div class="sidebar-settings">
                    <div class="setting-item">
                        <label class="form-check-label" for="sidebar-notifications">
                            <i class="fas fa-bell me-2"></i>Notifications
                        </label>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="sidebar-notifications" checked>
                        </div>
                    </div>
                    <div class="setting-item">
                        <label class="form-check-label" for="sidebar-sound">
                            <i class="fas fa-volume-up me-2"></i>Sound Effects
                        </label>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="sidebar-sound" checked>
                        </div>
                    </div>
                    <div class="setting-item">
                        <button class="btn btn-outline-secondary btn-sm w-100" onclick="toggleTheme()">
                            <i class="fas fa-moon me-1" id="sidebar-theme-icon"></i>
                            <span id="sidebar-theme-text">Dark Mode</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Sidebar Component Styles */
    .sidebar-component .offcanvas {
        width: 320px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.9));
        backdrop-filter: blur(20px);
        border-right: 1px solid rgba(255, 255, 255, 0.2);
    }

    [data-theme="dark"] .sidebar-component .offcanvas {
        background: linear-gradient(135deg, rgba(17, 24, 39, 0.95), rgba(17, 24, 39, 0.9));
        border-right: 1px solid rgba(255, 255, 255, 0.1);
    }

    .sidebar-section {
        margin-bottom: 2rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .sidebar-section:last-child {
        border-bottom: none;
    }

    .sidebar-section-title {
        font-size: 0.85rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-secondary);
        margin-bottom: 1rem;
    }

    .sidebar-nav {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .sidebar-nav .nav-item {
        margin-bottom: 0.5rem;
    }

    .sidebar-nav .nav-link {
        display: flex;
        align-items: center;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        color: var(--text-primary);
        text-decoration: none;
        transition: all 0.3s ease;
        font-weight: 500;
    }

    .sidebar-nav .nav-link:hover {
        background: rgba(99, 102, 241, 0.1);
        color: var(--primary-color);
    }

    .sidebar-nav .nav-link.active {
        background: var(--primary-color);
        color: white;
    }

    .quick-stats {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
    }

    .stat-item {
        display: flex;
        align-items: center;
        padding: 0.75rem;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .stat-icon {
        margin-right: 0.75rem;
        font-size: 1.2rem;
    }

    .stat-details {
        display: flex;
        flex-direction: column;
    }

    .stat-value {
        font-weight: 700;
        font-size: 1.1rem;
        color: var(--text-primary);
    }

    .stat-label {
        font-size: 0.8rem;
        color: var(--text-secondary);
    }

    .week-progress-sidebar {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        padding: 1rem;
    }

    .week-info {
        display: flex;
        justify-content: between;
        align-items: center;
        margin-bottom: 0.5rem;
    }

    .week-label {
        font-weight: 600;
        color: var(--text-primary);
    }

    .week-percentage {
        font-weight: 500;
        color: var(--primary-color);
    }

    .week-topic {
        margin-top: 0.5rem;
    }

    .quick-actions-sidebar .btn {
        font-size: 0.85rem;
        padding: 0.5rem 1rem;
    }

    .recent-achievements {
        max-height: 150px;
        overflow-y: auto;
    }

    .achievement-item {
        display: flex;
        align-items: center;
        padding: 0.5rem;
        margin-bottom: 0.5rem;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 6px;
        font-size: 0.85rem;
    }

    .achievement-text {
        color: var(--text-primary);
    }

    .timer-sidebar {
        text-align: center;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        padding: 1rem;
    }

    .timer-display-small {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--primary-color);
        font-family: 'Courier New', monospace;
        margin-bottom: 0.75rem;
    }

    .timer-controls-small {
        display: flex;
        justify-content: center;
        gap: 0.5rem;
    }

    .timer-controls-small .btn {
        padding: 0.25rem 0.5rem;
        font-size: 0.8rem;
    }

    .sidebar-settings {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
    }

    .setting-item {
        display: flex;
        justify-content: between;
        align-items: center;
        padding: 0.5rem;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 6px;
    }

    .setting-item label {
        margin: 0;
        font-size: 0.85rem;
        color: var(--text-primary);
    }

    .form-check-input:checked {
        background-color: var(--primary-color);
        border-color: var(--primary-color);
    }

    /* Responsive adjustments */
    @media (max-width: 576px) {
        .sidebar-component .offcanvas {
            width: 280px;
        }

        .sidebar-section {
            margin-bottom: 1.5rem;
        }

        .timer-display-small {
            font-size: 1.2rem;
        }
    }
</style>

<script>
    // Sidebar Component JavaScript
    class SidebarComponent {
        constructor() {
            this.sidebar = document.getElementById('sidebarOffcanvas');
            this.init();
        }

        init() {
            this.updateStats();
            this.updateWeekProgress();
            this.updateAchievements();
            this.bindEvents();

            // Update every 30 seconds
            setInterval(() => {
                this.updateStats();
                this.updateWeekProgress();
            }, 30000);
        }

        updateStats() {
            if (!window.dashboard) return;

            const userData = window.dashboard.userData;
            const stats = window.dashboard.calculateStats();

            document.getElementById('sidebar-streak').textContent = userData.streak || 0;
            document.getElementById('sidebar-completed').textContent = Object.keys(userData.completedTasks).length;
            document.getElementById('sidebar-projects').textContent = userData.projects.length;
        }

        updateWeekProgress() {
            if (!window.dashboard) return;

            const userData = window.dashboard.userData;
            const currentWeek = userData.currentWeek || 1;
            const weekProgress = userData.weekProgress[currentWeek] || 0;

            document.getElementById('sidebar-week-label').textContent = `Week ${currentWeek}`;
            document.getElementById('sidebar-week-progress').textContent = `${weekProgress}%`;
            document.getElementById('sidebar-week-bar').style.width = `${weekProgress}%`;

            // Update topic
            this.updateWeekTopic(currentWeek);
        }

        async updateWeekTopic(week) {
            const topics = [
                'Programming Fundamentals', 'Arrays & Strings', 'Linked Lists', 'Stacks & Queues',
                'Hash Tables', 'Trees (Part 1)', 'Trees (Part 2) & Heaps', 'Graphs (Part 1)',
                'Graphs (Part 2)', 'Sorting & Searching', 'Dynamic Programming', 'Advanced Algorithms',
                'System Design', 'Competitive Programming'
            ];

            const topic = topics[week - 1] || 'Advanced Topics';
            document.getElementById('sidebar-week-topic').textContent = topic;
        }

        updateAchievements() {
            if (!window.dashboard) return;

            const achievements = window.dashboard.userData.achievements.slice(-3);
            const container = document.getElementById('sidebar-achievements');

            if (achievements.length === 0) {
                container.innerHTML = `
                <div class="achievement-item">
                    <i class="fas fa-star text-warning me-2"></i>
                    <span class="achievement-text">No achievements yet</span>
                </div>
            `;
                return;
            }

            container.innerHTML = achievements.map(achievement => `
            <div class="achievement-item">
                <i class="fas fa-trophy text-success me-2"></i>
                <span class="achievement-text">${achievement.name}</span>
            </div>
        `).join('');
        }

        bindEvents() {
            // Navigation links
            const navLinks = this.sidebar.querySelectorAll('.nav-link');
            navLinks.forEach(link => {
                link.addEventListener('click', () => {
                    this.setActiveNavLink(link);
                    // Close sidebar on mobile
                    if (window.innerWidth < 992) {
                        bootstrap.Offcanvas.getInstance(this.sidebar)?.hide();
                    }
                });
            });

            // Settings switches
            const notificationSwitch = document.getElementById('sidebar-notifications');
            const soundSwitch = document.getElementById('sidebar-sound');

            notificationSwitch?.addEventListener('change', (e) => {
                this.updateSetting('notifications', e.target.checked);
            });

            soundSwitch?.addEventListener('change', (e) => {
                this.updateSetting('sound', e.target.checked);
            });

            // Theme toggle
            this.updateThemeButton();
        }

        setActiveNavLink(activeLink) {
            const navLinks = this.sidebar.querySelectorAll('.nav-link');
            navLinks.forEach(link => link.classList.remove('active'));
            activeLink.classList.add('active');
        }

        updateSetting(setting, value) {
            if (window.dashboard && window.dashboard.userData.preferences) {
                window.dashboard.userData.preferences[setting] = value;
                window.dashboard.saveUserData();
            }
        }

        updateThemeButton() {
            const themeIcon = document.getElementById('sidebar-theme-icon');
            const themeText = document.getElementById('sidebar-theme-text');

            if (themeIcon && themeText) {
                const currentTheme = localStorage.getItem('theme') || 'light';
                if (currentTheme === 'dark') {
                    themeIcon.className = 'fas fa-sun me-1';
                    themeText.textContent = 'Light Mode';
                } else {
                    themeIcon.className = 'fas fa-moon me-1';
                    themeText.textContent = 'Dark Mode';
                }
            }
        }

        show() {
            const offcanvas = new bootstrap.Offcanvas(this.sidebar);
            offcanvas.show();
        }

        hide() {
            const offcanvas = bootstrap.Offcanvas.getInstance(this.sidebar);
            offcanvas?.hide();
        }
    }

    // Initialize sidebar when DOM is loaded
    document.addEventListener('DOMContentLoaded', () => {
        window.sidebarComponent = new SidebarComponent();
    });

    // Global function to show sidebar
    function showSidebar() {
        if (window.sidebarComponent) {
            window.sidebarComponent.show();
        }
    }
</script>
