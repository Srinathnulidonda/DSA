<div class="sidebar-content h-100 d-flex flex-column">

<script>
    // Sidebar initialization and real-time updates
    document.addEventListener('DOMContentLoaded', function () {
        initializeSidebar();
    });

    function initializeSidebar() {
        // Update user information
        updateSidebarUserInfo();

        // Update quick stats
        updateQuickStats();

        // Load weekly progress
        loadWeeklyProgress();

        // Set today's focus
        setTodaysFocus();

        // Initialize navigation handlers
        initializeNavigation();

        // Set up real-time updates
        setupRealTimeUpdates();
    }

    function updateSidebarUserInfo() {
        if (window.DSAApp && window.DSAApp.userStats) {
            const stats = window.DSAApp.userStats;
            const userInfo = stats.user_info || {};

            // Update user name
            const nameElement = document.getElementById('sidebarUserName');
            if (nameElement) {
                nameElement.textContent = userInfo.display_name || 'User';
            }

            // Update user level
            const levelElement = document.getElementById('sidebarUserLevel');
            if (levelElement) {
                levelElement.textContent = `Level ${stats.level || 1}`;
            }

            // Update progress bar
            const progressElement = document.getElementById('sidebarUserProgress');
            if (progressElement && stats.experience) {
                const currentLevelExp = ((stats.level - 1) * 1000);
                const nextLevelExp = (stats.level * 1000);
                const progress = ((stats.experience - currentLevelExp) / (nextLevelExp - currentLevelExp)) * 100;
                progressElement.style.width = `${Math.max(0, Math.min(100, progress))}%`;
            }

            // Update avatar
            const avatarElement = document.getElementById('sidebarUserAvatar');
            if (avatarElement && userInfo.photoURL) {
                avatarElement.src = userInfo.photoURL;
            }
        }
    }

    function updateQuickStats() {
        if (window.DSAApp && window.DSAApp.userStats) {
            const stats = window.DSAApp.userStats;

            // Update completed topics
            const completedElement = document.getElementById('sidebarCompletedTopics');
            if (completedElement) {
                completedElement.textContent = stats.total_completed_topics || 0;
            }

            // Update current streak
            const streakElement = document.getElementById('sidebarCurrentStreak');
            if (streakElement) {
                streakElement.textContent = stats.current_streak || 0;
                if (stats.current_streak > 0) {
                    streakElement.classList.add('streak-fire');
                }
            }

            // Update total hours
            const hoursElement = document.getElementById('sidebarTotalHours');
            if (hoursElement) {
                hoursElement.textContent = Math.round(stats.total_time_spent || 0);
            }

            // Update navigation badges
            updateNavigationBadges(stats);
        }
    }

    function updateNavigationBadges(stats) {
        // Update roadmap progress
        const roadmapElement = document.getElementById('roadmapProgress');
        if (roadmapElement) {
            roadmapElement.textContent = `${stats.completion_percentage || 0}%`;
        }

        // Update notes count
        const notesElement = document.getElementById('notesCount');
        if (notesElement && window.DSAApp.userNotes) {
            notesElement.textContent = window.DSAApp.userNotes.length;
        }

        // Update review count
        const reviewElement = document.getElementById('reviewCount');
        if (reviewElement && window.DSAApp.userNotes) {
            const reviewCount = window.DSAApp.userNotes.filter(note => note.review_needed).length;
            reviewElement.textContent = reviewCount;
            reviewElement.style.display = reviewCount > 0 ? 'block' : 'none';
        }

        // Update achievements count
        const achievementsElement = document.getElementById('achievementsCount');
        if (achievementsElement && window.DSAApp.achievements) {
            achievementsElement.textContent = window.DSAApp.achievements.length;
        }

        // Update upcoming events
        const eventsElement = document.getElementById('upcomingEvents');
        if (eventsElement && window.DSAApp.calendarEvents) {
            const upcomingCount = getUpcomingEventsCount();
            eventsElement.textContent = upcomingCount;
            eventsElement.style.display = upcomingCount > 0 ? 'block' : 'none';
        }
    }

    function loadWeeklyProgress() {
        const container = document.getElementById('weeklyProgressList');
        if (!container || !window.DSAApp.roadmapData) return;

        let html = '';

        Object.entries(window.DSAApp.roadmapData).forEach(([weekKey, weekData], index) => {
            const weekNumber = index + 1;
            const progress = getWeekProgress(weekKey);
            const status = getWeekStatus(weekKey, progress);

            html += `
            <div class="week-progress-item ${status}" onclick="navigateToWeek('${weekKey}')">
                <div class="flex-grow-1">
                    <div class="week-number">Week ${weekNumber}</div>
                    <div class="week-title">${weekData.title}</div>
                    <div class="week-progress">${progress.completed}/${progress.total} topics</div>
                </div>
                <div class="week-status">
                    ${status === 'completed' ? '<i class="fas fa-check-circle text-success"></i>' :
                    status === 'current' ? '<i class="fas fa-play-circle text-warning"></i>' :
                        '<i class="fas fa-circle text-muted"></i>'}
                </div>
            </div>
        `;
        });

        container.innerHTML = html;
    }

    function getWeekProgress(weekKey) {
        if (!window.DSAApp.userProgress) {
            return { completed: 0, total: 0 };
        }

        const weekProgress = window.DSAApp.userProgress.filter(p => p.week === weekKey);
        const completed = weekProgress.filter(p => p.completed).length;
        const total = Object.keys(window.DSAApp.roadmapData[weekKey].days).length;

        return { completed, total };
    }

    function getWeekStatus(weekKey, progress) {
        if (progress.completed === progress.total && progress.total > 0) {
            return 'completed';
        }

        // Determine current week (simplified logic)
        const weekNumber = parseInt(weekKey.split('_')[1]);
        const currentWeek = getCurrentWeek();

        if (weekNumber === currentWeek) {
            return 'current';
        }

        return 'upcoming';
    }

    function getCurrentWeek() {
        // This would be calculated based on user's start date
        // For now, return week 1
        return 1;
    }

    function setTodaysFocus() {
        const container = document.getElementById('todayTopic');
        if (!container) return;

        // Update today's date
        const dateElement = document.getElementById('todayDate');
        if (dateElement) {
            dateElement.textContent = new Date().toLocaleDateString('en-US', {
                weekday: 'short',
                month: 'short',
                day: 'numeric'
            });
        }

        // Get today's topic
        const todayTopic = getTodaysTopic();

        if (todayTopic) {
            container.innerHTML = `
            <div class="topic-card" onclick="navigateToToday()">
                <div class="topic-title">${todayTopic.topic}</div>
                <div class="topic-description">${todayTopic.activities}</div>
                <div class="topic-progress mt-2">
                    <div class="progress" style="height: 4px;">
                        <div class="progress-bar bg-primary" style="width: ${todayTopic.progress}%"></div>
                    </div>
                    <div class="d-flex justify-content-between mt-1">
                        <small class="text-muted">${todayTopic.progress}% complete</small>
                        <small class="text-muted">${todayTopic.estimatedTime}</small>
                    </div>
                </div>
            </div>
        `;
        }
    }

    function getTodaysTopic() {
        // This would determine today's topic based on the roadmap and user's progress
        // For now, return a sample topic

        const currentWeek = 'week_1';
        const currentDay = 'monday';

        if (window.DSAApp.roadmapData && window.DSAApp.roadmapData[currentWeek]) {
            const dayData = window.DSAApp.roadmapData[currentWeek].days[currentDay];
            if (dayData) {
                // Check if user has progress on this topic
                const userProgress = window.DSAApp.userProgress.find(p =>
                    p.week === currentWeek && p.day === currentDay
                );

                return {
                    topic: dayData.topic,
                    activities: dayData.activities,
                    estimatedTime: dayData.estimated_time || '2-3 hours',
                    progress: userProgress?.completed ? 100 : (userProgress?.time_spent || 0) * 10,
                    week: currentWeek,
                    day: currentDay
                };
            }
        }

        return null;
    }

    function initializeNavigation() {
        // Add click handlers for navigation links
        document.querySelectorAll('.nav-link[data-page]').forEach(link => {
            link.addEventListener('click', function (e) {
                e.preventDefault();
                const page = this.dataset.page;

                // Update active state
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                this.classList.add('active');

                // Navigate to page
                if (window.DSAApp) {
                    window.DSAApp.navigateTo(page);
                }
            });
        });

        // Handle collapse toggles
        document.querySelectorAll('.nav-collapse-toggle').forEach(toggle => {
            toggle.addEventListener('click', function (e) {
                e.preventDefault();
                // Bootstrap will handle the collapse
            });
        });
    }

    function setupRealTimeUpdates() {
        // Listen for real-time updates
        if (window.DSAApp && window.DSAApp.api) {
            // Progress updates
            window.DSAApp.api.addEventListener('progress-update', () => {
                updateQuickStats();
                loadWeeklyProgress();
                setTodaysFocus();
            });

            // Achievement updates
            window.DSAApp.api.addEventListener('achievement-unlock', () => {
                updateQuickStats();
            });

            // Streak updates
            window.DSAApp.api.addEventListener('streak-update', () => {
                updateQuickStats();
            });

            // Note updates
            window.DSAApp.api.addEventListener('note-update', () => {
                updateQuickStats();
            });
        }

        // Update every 5 minutes
        setInterval(() => {
            updateQuickStats();
        }, 5 * 60 * 1000);
    }

    function getUpcomingEventsCount() {
        if (!window.DSAApp.calendarEvents) return 0;

        const now = new Date();
        const nextWeek = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);

        return window.DSAApp.calendarEvents.filter(event => {
            const eventDate = new Date(event.date);
            return eventDate >= now && eventDate <= nextWeek;
        }).length;
    }

    // Navigation functions
    function navigateToWeek(weekKey) {
        if (window.DSAApp) {
            window.DSAApp.navigateTo('roadmap', { week: weekKey });
        }
    }

    function navigateToToday() {
        const todayTopic = getTodaysTopic();
        if (todayTopic && window.DSAApp) {
            window.DSAApp.navigateTo('roadmap', {
                week: todayTopic.week,
                day: todayTopic.day
            });
        }
    }

    function startDailySession() {
        const todayTopic = getTodaysTopic();
        if (todayTopic) {
            // Start pomodoro timer and navigate to today's topic
            if (window.DSAApp) {
                window.DSAApp.navigateTo('roadmap', {
                    week: todayTopic.week,
                    day: todayTopic.day
                });

                // Optionally start pomodoro timer
                setTimeout(() => {
                    const pomodoroModal = new bootstrap.Modal(document.getElementById('pomodoroModal'));
                    pomodoroModal.show();
                }, 500);
            }
        } else {
            // Navigate to roadmap if no specific topic
            if (window.DSAApp) {
                window.DSAApp.navigateTo('roadmap');
            }
        }
    }

    // Update navigation active state based on current page
    function updateNavigationState(currentPage) {
        document.querySelectorAll('.nav-link').forEach(link => {
            link.classList.remove('active');
            if (link.dataset.page === currentPage) {
                link.classList.add('active');
            }
        });
    }

    // Export function for use by main app
    window.updateSidebarNavigation = updateNavigationState;
</script>
