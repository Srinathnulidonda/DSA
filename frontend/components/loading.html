<!-- Loading Component -->
<div id="loadingComponent" class="hidden">
    <!-- Full Page Loading -->
    <div
        class="loading-overlay fixed inset-0 bg-white dark:bg-gray-900 bg-opacity-90 dark:bg-opacity-90 flex items-center justify-center z-50">
        <div class="text-center">
            <div class="loading-spinner mb-4">
                <div class="relative">
                    <div class="w-20 h-20 border-4 border-gray-200 dark:border-gray-700 rounded-full"></div>
                    <div
                        class="w-20 h-20 border-4 border-blue-500 rounded-full animate-spin absolute top-0 left-0 border-t-transparent">
                    </div>
                </div>
            </div>
            <p class="text-gray-600 dark:text-gray-400 font-medium">Loading...</p>
        </div>
    </div>

    <!-- Skeleton Loaders -->
    <div class="skeleton-components hidden">
        <!-- Card Skeleton -->
        <div class="skeleton-card bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-6">
            <div class="animate-pulse">
                <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-3/4 mb-4"></div>
                <div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-full mb-2"></div>
                <div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-5/6 mb-2"></div>
                <div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-4/6"></div>
            </div>
        </div>

        <!-- List Item Skeleton -->
        <div class="skeleton-list-item flex items-center space-x-4 p-4">
            <div class="animate-pulse flex-1">
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
                    <div class="flex-1">
                        <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-3/4 mb-2"></div>
                        <div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-1/2"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chart Skeleton -->
        <div class="skeleton-chart animate-pulse">
            <div class="h-64 bg-gray-200 dark:bg-gray-700 rounded-lg"></div>
        </div>
    </div>

    <!-- Progress Bar Loading -->
    <div class="progress-loading hidden fixed top-0 left-0 right-0 z-50">
        <div class="h-1 bg-gray-200 dark:bg-gray-700">
            <div class="h-1 bg-blue-500 animate-progress"></div>
        </div>
    </div>
</div>

<style>
    @keyframes progress {
        0% {
            width: 0%;
            margin-left: 0%;
        }

        50% {
            width: 60%;
            margin-left: 20%;
        }

        100% {
            width: 0%;
            margin-left: 100%;
        }
    }

    .animate-progress {
        animation: progress 2s ease-in-out infinite;
    }
</style>
